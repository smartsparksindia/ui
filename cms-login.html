<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartSpark CMS — Login</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --purple:#7F77DD;
  --purple-dark:#3C3489;
  --coral:#D85A30;
  --amber-light:#FAEEDA;
  --text:#2C2C2A;
  --text-muted:#888780;
  --radius:20px;
}

* { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family:'Nunito',sans-serif;
  background:linear-gradient(135deg,#EEEDFE,#E1F5EE);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:2rem;
}

.login-container {
  background:white;
  width:100%;
  max-width:420px;
  padding:3rem 2.5rem;
  border-radius:var(--radius);
  box-shadow:0 12px 40px rgba(0,0,0,0.12);
}

.logo {
  text-align:center;
  font-family:'Fredoka One';
  font-size:2rem;
  color:var(--purple);
  margin-bottom:1.5rem;
}
.logo span { color:var(--coral); }

h2 {
  text-align:center;
  margin-bottom:0.5rem;
}

p {
  text-align:center;
  color:var(--text-muted);
  margin-bottom:1.5rem;
}

.form-group { margin-bottom:1rem; }

label {
  font-weight:800;
  font-size:0.85rem;
  display:block;
  margin-bottom:0.3rem;
}

input, select {
  width:100%;
  padding:0.9rem;
  border-radius:12px;
  border:2px solid #eee;
  background:#fafafa;
}

input:focus {
  border-color:var(--purple);
  background:white;
  outline:none;
}

button {
  width:100%;
  padding:1rem;
  border:none;
  border-radius:12px;
  background:var(--purple);
  color:white;
  font-weight:800;
  cursor:pointer;
}

button:hover { opacity:0.9; }

.tabs {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:0.5rem;
  margin-bottom:1rem;
}

.tab {
  padding:0.7rem;
  border:2px solid #eee;
  background:transparent;
  border-radius:10px;
  font-weight:800;
  cursor:pointer;
}

.tab.active {
  background:var(--purple);
  color:white;
  border-color:var(--purple);
}

#error {
  display:none;
  background:#FAECE7;
  color:var(--coral);
  padding:0.8rem;
  border-radius:10px;
  margin-bottom:1rem;
  font-weight:700;
}

#error.show { display:block; }

.demo {
  margin-top:1rem;
  background:var(--amber-light);
  padding:1rem;
  border-radius:10px;
  font-size:0.85rem;
}
</style>
</head>

<body>

<div class="login-container">

  <div class="logo">Smart<span>Spark</span> ⚡</div>

  <h2>CMS Login</h2>
  <p>Admin & Contributor Access</p>

  <div id="error"></div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Login</button>
    <button class="tab" onclick="switchTab('register')">Register</button>
  </div>

  <!-- LOGIN -->
  <form id="login-form">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" required>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" required>
    </div>

    <button type="submit">Login</button>

    <div class="demo">
      <strong>Demo Accounts:</strong><br>
      admin@smartspark.in / admin123<br>
      contributor@smartspark.in / contrib123<br>
      student@smartspark.in / student123
    </div>
  </form>

  <!-- REGISTER -->
  <form id="register-form" style="display:none;">
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="reg-name">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="reg-email">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="reg-password">
    </div>

    <div class="form-group">
      <label>Role</label>
      <select id="reg-role">
        <option value="student">Student</option>
        <option value="contributor">Contributor</option>
        <option value="admin">Admin</option>
      </select>
    </div>

    <button type="submit">Create Account</button>
  </form>

</div>

<script>
// ===================== STORAGE =====================
function getUsers() {
  return JSON.parse(localStorage.getItem('ss_users') || '{}');
}

function saveUsers(users) {
  localStorage.setItem('ss_users', JSON.stringify(users));
}

function setUser(user) {
  sessionStorage.setItem('ss_current_user', JSON.stringify(user));
}

function normalize(email) {
  return email.toLowerCase().trim();
}

// ===================== FORCE USERS =====================
function seedUsers() {
  const users = getUsers();

  users["admin@smartspark.in"] = users["admin@smartspark.in"] || {
    name:"Admin",
    email:"admin@smartspark.in",
    password:"admin123",
    role:"admin"
  };

  users["contributor@smartspark.in"] = users["contributor@smartspark.in"] || {
    name:"Contributor",
    email:"contributor@smartspark.in",
    password:"contrib123",
    role:"contributor"
  };

  users["student@smartspark.in"] = users["student@smartspark.in"] || {
    name:"Student",
    email:"student@smartspark.in",
    password:"student123",
    role:"student"
  };

  saveUsers(users);
}

// ===================== LOGIN =====================
function loginUser(email, password) {
  const users = getUsers();
  const user = users[normalize(email)];

  if (!user) return { success:false, message:"User not found" };
  if (user.password !== password) return { success:false, message:"Wrong password" };

  setUser(user);
  return { success:true, user };
}

// ===================== REGISTER =====================
function registerUser(name,email,password,role) {
  const users = getUsers();
  const key = normalize(email);

  if (users[key]) return users[key];

  const user = { name,email:key,password,role };
  users[key] = user;
  saveUsers(users);
  return user;
}

// ===================== UI =====================
function showError(msg) {
  const el = document.getElementById('error');
  el.innerText = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}

function switchTab(tab) {
  document.getElementById('login-form').style.display = tab==='login'?'block':'none';
  document.getElementById('register-form').style.display = tab==='register'?'block':'none';

  document.querySelectorAll('.tab').forEach((b,i)=>{
    b.classList.toggle('active', tab==='login'?i===0:i===1);
  });
}

// ===================== INIT =====================
window.addEventListener('DOMContentLoaded',()=>{

  seedUsers();

  // LOGIN
  document.getElementById('login-form').addEventListener('submit',(e)=>{
    e.preventDefault();

    const email = document.getElementById('login-email').value;
    const pass = document.getElementById('login-password').value;

    const res = loginUser(email,pass);

    if(!res.success) return showError(res.message);

    window.location.href =
      res.user.role === 'student'
        ? 'index.html'
        : 'cms-dashboard.html';
  });

  // REGISTER
  document.getElementById('register-form').addEventListener('submit',(e)=>{
    e.preventDefault();

    const name = document.getElementById('reg-name').value;
    const email = document.getElementById('reg-email').value;
    const pass = document.getElementById('reg-password').value;
    const role = document.getElementById('reg-role').value;

    const user = registerUser(name,email,pass,role);

    setUser(user);

    window.location.href =
      role==='student'
        ? 'index.html'
        : 'cms-dashboard.html';
  });

});
</script>

</body>
</html>
