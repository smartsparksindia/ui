<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartSpark CMS — Login</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --purple: #7F77DD;
  --purple-light: #EEEDFE;
  --purple-dark: #3C3489;
  --teal: #1D9E75;
  --teal-light: #E1F5EE;
  --coral: #D85A30;
  --coral-light: #FAECE7;
  --amber: #BA7517;
  --amber-light: #FAEEDA;
  --bg: #FFF9F0;
  --text: #2C2C2A;
  --text-muted: #888780;
  --radius: 20px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(135deg, var(--purple-light), var(--teal-light));
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}

.login-container {
  background: white;
  border-radius: var(--radius);
  padding: 3rem 2.5rem;
  max-width: 420px;
  width: 100%;
  box-shadow: 0 12px 40px rgba(0,0,0,0.12);
}

.logo {
  text-align: center;
  margin-bottom: 2rem;
  font-family: 'Fredoka One', cursive;
  font-size: 2.2rem;
  color: var(--purple);
}
.logo span { color: var(--coral); }

.login-title {
  text-align: center;
  font-family: 'Fredoka One';
  margin-bottom: 0.5rem;
}

.login-sub {
  text-align: center;
  color: var(--text-muted);
  margin-bottom: 2rem;
}

.form-group { margin-bottom: 1.2rem; }

label {
  font-weight: 800;
  font-size: 0.9rem;
  display: block;
  margin-bottom: 0.4rem;
}

input, select {
  width: 100%;
  padding: 0.9rem 1rem;
  border-radius: 12px;
  border: 2px solid #eee;
  background: #fafafa;
}

input:focus {
  border-color: var(--purple);
  outline: none;
  background: white;
}

.btn-submit {
  width: 100%;
  padding: 1rem;
  border: none;
  border-radius: 12px;
  background: var(--purple);
  color: white;
  font-weight: 800;
  cursor: pointer;
}

.btn-submit:hover { opacity: 0.9; }

.error-msg {
  display: none;
  background: var(--coral-light);
  color: var(--coral);
  padding: 0.8rem;
  border-radius: 10px;
  margin-bottom: 1rem;
  font-weight: 700;
}

.error-msg.show { display: block; }

.form-tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  margin-bottom: 1.5rem;
  gap: 0.5rem;
}

.tab-btn {
  padding: 0.7rem;
  border-radius: 10px;
  border: 2px solid #eee;
  background: transparent;
  cursor: pointer;
  font-weight: 800;
}

.tab-btn.active {
  background: var(--purple);
  color: white;
  border-color: var(--purple);
}

.demo-info {
  margin-top: 1rem;
  font-size: 0.85rem;
  background: var(--amber-light);
  padding: 1rem;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="login-container">

  <div class="logo">Smart<span>Spark</span> ⚡</div>

  <h2 class="login-title">CMS Login</h2>
  <p class="login-sub">Admin & Contributors Panel</p>

  <div class="error-msg" id="error"></div>

  <div class="form-tabs">
    <button class="tab-btn active" onclick="switchTab('login')">Login</button>
    <button class="tab-btn" onclick="switchTab('register')">Register</button>
  </div>

  <!-- LOGIN -->
  <form id="login-form">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" required>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" required>
    </div>

    <button class="btn-submit" type="submit">Login</button>

    <div class="demo-info">
      <strong>Demo Accounts:</strong><br>
      Admin: admin@smartspark.in / admin123<br>
      Contributor: contributor@smartspark.in / contrib123<br>
      Student: student@smartspark.in / student123
    </div>
  </form>

  <!-- REGISTER -->
  <form id="register-form" style="display:none;">
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="reg-name">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="reg-email">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="reg-password">
    </div>

    <div class="form-group">
      <label>Role</label>
      <select id="reg-role">
        <option value="student">Student</option>
        <option value="contributor">Contributor</option>
        <option value="admin">Admin</option>
      </select>
    </div>

    <button class="btn-submit" type="submit">Create Account</button>
  </form>

</div>

<script>
// =======================
// STORAGE CORE (FIXED)
// =======================
function getUsers() {
  return JSON.parse(localStorage.getItem('ss_users') || '{}');
}

function saveUsers(users) {
  localStorage.setItem('ss_users', JSON.stringify(users));
}

function setCurrentUser(user) {
  sessionStorage.setItem('ss_current_user', JSON.stringify(user));
}

function getCurrentUser() {
  return JSON.parse(sessionStorage.getItem('ss_current_user'));
}

// =======================
// INIT DEMO USERS (SAFE)
// =======================
function initUsers() {
  const users = getUsers();

  if (Object.keys(users).length > 0) return;

  users["admin@smartspark.in"] = {
    name: "Admin",
    email: "admin@smartspark.in",
    password: "admin123",
    role: "admin"
  };

  users["contributor@smartspark.in"] = {
    name: "Contributor",
    email: "contributor@smartspark.in",
    password: "contrib123",
    role: "contributor"
  };

  users["student@smartspark.in"] = {
    name: "Student",
    email: "student@smartspark.in",
    password: "student123",
    role: "student"
  };

  saveUsers(users);
}

// =======================
// LOGIN
// =======================
function login(email, password) {
  const users = getUsers();
  const user = users[email.toLowerCase().trim()];

  if (!user) return { success:false, message:"User not found" };

  if (user.password !== password)
    return { success:false, message:"Incorrect password" };

  setCurrentUser(user);

  return { success:true, user };
}

// =======================
// REGISTER
// =======================
function register(name, email, password, role) {
  const users = getUsers();

  const key = email.toLowerCase().trim();

  if (users[key]) {
    return { success:false, message:"User already exists" };
  }

  users[key] = {
    name,
    email: key,
    password,
    role
  };

  saveUsers(users);

  return { success:true };
}

// =======================
// UI LOGIC
// =======================
function switchTab(tab) {
  document.getElementById('login-form').style.display =
    tab === 'login' ? 'block' : 'none';

  document.getElementById('register-form').style.display =
    tab === 'register' ? 'block' : 'none';

  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active', (tab==='login'?i===0:i===1));
  });
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 4000);
}

// =======================
// EVENTS
// =======================
document.addEventListener('DOMContentLoaded', () => {

  initUsers();

  // LOGIN
  document.getElementById('login-form').onsubmit = (e) => {
    e.preventDefault();

    const email = document.getElementById('login-email').value;
    const pass = document.getElementById('login-password').value;

    const res = login(email, pass);

    if (!res.success) return showError(res.message);

    window.location.href =
      res.user.role === 'student'
        ? 'index.html'
        : 'cms-dashboard.html';
  };

  // REGISTER
  document.getElementById('register-form').onsubmit = (e) => {
    e.preventDefault();

    const name = document.getElementById('reg-name').value;
    const email = document.getElementById('reg-email').value;
    const pass = document.getElementById('reg-password').value;
    const role = document.getElementById('reg-role').value;

    const res = register(name, email, pass, role);

    if (!res.success) return showError(res.message);

    showError("Account created! Please login.");
    switchTab('login');
  };

});
</script>

</body>
</html>
