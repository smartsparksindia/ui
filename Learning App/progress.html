<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartSpark — My Progress</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root { --purple: #7F77DD; --teal: #1D9E75; --amber: #BA7517; --coral: #D85A30; --bg: #FFF9F0; --text: #2C2C2A; --text-muted: #888780; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
nav { background: white; padding: 1rem 2.5rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid #F0EBE0; }
.logo { font-family: 'Fredoka One', cursive; font-size: 2rem; color: var(--purple); text-decoration: none; }
.logo span { color: var(--coral); }
.main { max-width: 1000px; margin: 0 auto; padding: 2rem; }
.dashboard-title { font-family: 'Fredoka One', cursive; font-size: 2.2rem; margin-bottom: 2rem; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.2rem; margin-bottom: 2.5rem; }
.stat-card { background: white; border-radius: 20px; padding: 1.5rem; border-left: 4px solid var(--purple); box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
.stat-label { font-size: 0.85rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
.stat-value { font-family: 'Fredoka One', cursive; font-size: 2.5rem; font-weight: 800; color: var(--purple); margin-top: 0.5rem; }
.chapters-section { background: white; border-radius: 20px; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
.section-title { font-family: 'Fredoka One', cursive; font-size: 1.6rem; margin-bottom: 1.5rem; }
.chapter-item { padding: 1rem; background: var(--bg); border-radius: 12px; margin-bottom: 0.8rem; display: flex; justify-content: space-between; }
.ch-details { flex: 1; }
.ch-name { font-weight: 800; margin-bottom: 0.3rem; }
.ch-score { font-size: 0.9rem; color: var(--text-muted); }
.ch-pts { font-family: 'Fredoka One', cursive; font-size: 1.4rem; color: var(--amber); }
footer { background: var(--text); color: white; text-align: center; padding: 2rem; }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Smart<span>Spark</span> ⚡</a>
  <a href="index.html" style="color:var(--text-muted);text-decoration:none;font-weight:700;">← Home</a>
</nav>
<div class="main">
  <h1 class="dashboard-title">📊 Your Progress</h1>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total Points</div>
      <div class="stat-value" id="total-pts">0</div>
    </div>
    <div class="stat-card" style="border-left-color:var(--teal);">
      <div class="stat-label">Chapters Completed</div>
      <div class="stat-value" id="completed-ch" style="color:var(--teal);">0</div>
    </div>
    <div class="stat-card" style="border-left-color:var(--coral);">
      <div class="stat-label">Current Streak</div>
      <div class="stat-value" id="streak" style="color:var(--coral);">0 days</div>
    </div>
    <div class="stat-card" style="border-left-color:var(--amber);">
      <div class="stat-label">Longest Streak</div>
      <div class="stat-value" id="longest" style="color:var(--amber);">0 days</div>
    </div>
  </div>
  <div class="chapters-section">
    <h2 class="section-title">📚 Your Chapters</h2>
    <div id="chapters-list">Loading...</div>
  </div>
</div>
<footer>
  <p>SmartSpark — Learning made smart 🇮🇳</p>
</footer>
<script src="data-layer.js"></script>
<script>
window.addEventListener('DOMContentLoaded', () => {
  const user = getCurrentUser();
  if (!user) { window.location.href = 'index.html'; return; }
  
  const progress = getUserProgress(user.user_id);
  if (!progress) { document.getElementById('chapters-list').innerHTML = 'No chapters attempted yet. Start learning!'; return; }
  
  document.getElementById('total-pts').textContent = progress.total_points || 0;
  document.getElementById('completed-ch').textContent = Object.values(progress.chapters_progress || {}).filter(p => p.status === 'completed').length;
  document.getElementById('streak').textContent = (progress.current_streak || 0) + ' days';
  document.getElementById('longest').textContent = (progress.longest_streak || 0) + ' days';
  
  const chapters = getStore('ss_chapters');
  const list = document.getElementById('chapters-list');
  const items = Object.entries(progress.chapters_progress || {}).map(([chId, prog]) => {
    const ch = chapters[chId];
    if (!ch) return '';
    return `
      <div class="chapter-item">
        <div class="ch-details">
          <div class="ch-name">${ch.title}</div>
          <div class="ch-score">Class ${ch.class} • ${ch.subject} • Accuracy: ${prog.accuracy_pct || 0}%</div>
        </div>
        <div class="ch-pts">⭐ ${prog.points_earned || 0}</div>
      </div>
    `;
  }).join('');
  
  list.innerHTML = items || '<p style="color:var(--text-muted);">No chapters attempted yet</p>';
});
</script>
</body>
</html>
