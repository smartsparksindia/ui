<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartSpark — Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root { --purple: #7F77DD; --teal: #1D9E75; --coral: #D85A30; --bg: #FFF9F0; --text: #2C2C2A; --text-muted: #888780; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

nav { background: white; padding: 1rem 2.5rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid #F0EBE0; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.logo { font-family: 'Fredoka One', cursive; font-size: 2rem; color: var(--purple); text-decoration: none; }
.logo span { color: var(--coral); }
.nav-right { display: flex; align-items: center; gap: 1rem; }
.score-pill { background: #FAEEDA; color: var(--coral); padding: 0.4rem 1rem; border-radius: 50px; font-weight: 800; }
.back-btn { color: var(--text-muted); text-decoration: none; font-weight: 700; }

.breadcrumb { padding: 1.5rem 2.5rem 0; font-size: 0.85rem; color: var(--text-muted); }
.breadcrumb a { color: var(--purple); text-decoration: none; }

.header { text-align: center; padding: 2.5rem 2rem; }
.header h1 { font-family: 'Fredoka One', cursive; font-size: 2.2rem; margin-bottom: 0.6rem; }
.header p { color: var(--text-muted); font-weight: 600; }

.flashcards-wrap { max-width: 700px; margin: 0 auto; padding: 0 2rem 4rem; }

.counter { text-align: center; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 2rem; }

.flashcard {
  background: linear-gradient(135deg, white 60%, #f5f5f5);
  border: 3px solid var(--teal);
  border-radius: 20px;
  padding: 2rem;
  margin-bottom: 2rem;
  cursor: pointer;
  min-height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
  perspective: 1000px;
  position: relative;
}

.flashcard:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(29, 158, 117, 0.2);
}

.flashcard.flipped {
  border-color: var(--purple);
}

.flashcard-inner {
  position: relative;
  width: 100%;
  height: 100%;
  text-align: center;
  transition: transform 0.6s;
  transform-style: preserve-3d;
}

.flashcard.flipped .flashcard-inner {
  transform: rotateY(180deg);
}

.flashcard-front,
.flashcard-back {
  position: absolute;
  width: 100%;
  height: 100%;
  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.flashcard-back {
  transform: rotateY(180deg);
}

.flashcard-label {
  font-size: 0.75rem;
  text-transform: uppercase;
  font-weight: 800;
  color: var(--text-muted);
  margin-bottom: 1rem;
}

.flashcard-content {
  font-family: 'Fredoka One', cursive;
  font-size: 1.8rem;
  font-weight: 800;
  color: var(--text);
  line-height: 1.4;
  word-break: break-word;
}

.flashcard-hint {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-top: 1.5rem;
  font-style: italic;
}

.controls {
  display: flex;
  gap: 1rem;
  justify-content: center;
  margin-bottom: 2rem;
  flex-wrap: wrap;
}

.btn {
  padding: 0.8rem 1.6rem;
  border: none;
  border-radius: 12px;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-prev, .btn-next {
  background: var(--teal);
  color: white;
}

.btn-prev:hover, .btn-next:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(29, 158, 117, 0.2);
}

.btn-quiz {
  background: var(--purple);
  color: white;
}

.btn-quiz:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(127, 119, 221, 0.2);
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.empty-state {
  text-align: center;
  padding: 3rem 2rem;
  color: var(--text-muted);
}

footer { background: var(--text); color: white; text-align: center; padding: 2.5rem 2rem; }
footer p { color: rgba(255,255,255,0.45); margin-top: 0.4rem; }

@media(max-width: 600px) {
  .flashcard {
    padding: 1.5rem;
    min-height: 150px;
  }

  .flashcard-content {
    font-size: 1.3rem;
  }

  .controls {
    flex-direction: column;
  }

  .btn {
    width: 100%;
  }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Smart<span>Spark</span> ⚡</a>
  <div class="nav-right">
    <div class="score-pill">🃏 <span id="card-count">0</span> cards</div>
    <a href="chapters.html" class="back-btn">← Chapters</a>
  </div>
</nav>

<div class="breadcrumb">
  <a href="index.html">Home</a> › <a href="chapters.html">Chapters</a> › <span id="bc-unit">Unit 1</span>
</div>

<div class="header">
  <h1>🃏 Flashcards</h1>
  <p>Click card to reveal definition</p>
</div>

<div class="flashcards-wrap">
  <div class="counter">
    <span id="current-index">1</span> / <span id="total-count">0</span>
  </div>

  <div id="flashcard-container"></div>

  <div class="controls">
    <button class="btn btn-prev" onclick="prevCard()" id="prev-btn">← Previous</button>
    <button class="btn btn-quiz" onclick="goToQuiz()">Start Quiz ❓</button>
    <button class="btn btn-next" onclick="nextCard()" id="next-btn">Next →</button>
  </div>
</div>

<footer>
  <div style="font-family:'Fredoka One',cursive;font-size:1.8rem;margin-bottom:0.4rem;">Smart<span style="color:#F0997B;">Spark</span> ⚡</div>
  <p>Master the basics with flashcards 🇮🇳</p>
</footer>

<script src="data-layer.js"></script>
<script>
const urlParams = new URLSearchParams(window.location.search);
const chapterNum = parseInt(urlParams.get('chapter'));
const unitNum = parseInt(urlParams.get('unit'));

// Get current state (subject and class)
const state = getState();
const year = state.year || 6;
const subject = state.subject || 'Science';

// Attempt to load published JSON files from repo; otherwise fall back to localStorage
let allChapters = {};
let allFlashcards = {};
// Load from /content/ folder only

async function loadDataStores() {
  // PHASE 2 ONLY: Load from /UI/content/year-{Y}/{subject}/
  // With 3-day cache for speed
  
  const safeSubject = subject.toLowerCase().replace(/\s+/g, '-');
  const cacheKey = `cache_y${year}_${safeSubject}`;
  
  // Check cache first
  const cachedData = getCacheData(cacheKey);
  if (cachedData) {
    console.log(`✅ Using cached data for ${subject}`);
    allChapters = cachedData.chapters;
    allFlashcards = cachedData.flashcards;
    return;
  }
  
  // Cache miss - load from JSON
  const phase2URL = `/UI/content/year-${year}/${safeSubject}/`;
  
  const possibleSubjectAreas = [
    'history', 'geography', 'civics', 'economics',
    'physics', 'chemistry', 'biology', 'science',
    'maths', 'mathematics', 'english', 'hindi',
    'social-science', 'social'
  ];
  
  // Reset before loading
  allChapters = {};
  allFlashcards = {};
  let loadedAnyFile = false;
  const loadedAreas = [];
  
  try {
    for (const area of possibleSubjectAreas) {
      try {
        const fileURL = `${phase2URL}${area}.json`;
        const response = await fetch(fileURL);
        
        if (response.ok) {
          const nestedData = await response.json();
          console.log(`✅ Loaded: ${fileURL}`);
          
          // Transform nested structure - accumulate
          nestedData.chapters.forEach(chapter => {
            const chapterId = `ch_${year}_${nestedData.subject}_${chapter.chapter_num}`;
            allChapters[chapterId] = {
              chapter_id: chapterId,
              class: year,
              subject: nestedData.subject,
              subject_area: nestedData.subject_area,
              chapter: chapter.chapter_num,
              title: chapter.chapter_name,
              status: 'published'
            };
            
            chapter.units.forEach(unit => {
              unit.flashcards.forEach(fc => {
                allFlashcards[fc.flashcard_id] = {
                  flashcard_id: fc.flashcard_id,
                  chapter_id: chapterId,
                  class: year,
                  subject: nestedData.subject,
                  subject_area: nestedData.subject_area,
                  chapter: chapter.chapter_num,
                  unit: unit.unit_num,
                  unit_name: unit.unit_name,
                  term: fc.term,
                  definition: fc.definition,
                  image_url: fc.image_url,
                  status: 'published'
                };
              });
            });
          });
          
          loadedAreas.push(area);
          loadedAnyFile = true;
        }
      } catch (e) {
        continue;
      }
    }
    
    if (loadedAnyFile) {
      console.log(`✅ Auto-discovered ${loadedAreas.length} subject areas:`, loadedAreas);
      
      // Cache the data for 3 days
      const dataToCache = {
        chapters: allChapters,
        flashcards: allFlashcards
      };
      setCacheData(cacheKey, dataToCache);
    } else {
      console.log('⚠️ No content found in /UI/content/year-' + year + '/' + safeSubject + '/');
    }
  } catch (e) {
    console.error('Error loading content:', e);
  }
}

let flashcards = [];
async function initFlashcards() {
  await loadDataStores();
  const publishedChapterIds = new Set(
    Object.values(allChapters)
      .filter(ch => ch.subject === subject && ch.class === year && ch.status === 'published')
      .map(ch => ch.chapter_id)
  );
  flashcards = Object.values(allFlashcards).filter(fc => 
    fc.chapter === chapterNum && 
    fc.unit === unitNum && 
    fc.subject === subject && 
    fc.class === year &&
    publishedChapterIds.has(fc.chapter_id)
  );
}

document.getElementById('bc-unit').textContent = `Chapter ${chapterNum} - Unit ${unitNum}`;
document.getElementById('card-count').textContent = flashcards.length;
document.getElementById('total-count').textContent = flashcards.length;

let currentIndex = 0;

function renderFlashcard() {
  const container = document.getElementById('flashcard-container');
  
  if (flashcards.length === 0) {
    container.innerHTML = '<div class="empty-state"><h3>No flashcards</h3><p>Check back later for content!</p></div>';
    return;
  }

  const fc = flashcards[currentIndex];
  const isFlipped = container.dataset.flipped === 'true';
  
  container.innerHTML = `
    <div class="flashcard ${isFlipped ? 'flipped' : ''}" onclick="flipCard(this)">
      <div class="flashcard-inner">
        <div class="flashcard-front">
          <div class="flashcard-label">Term</div>
          <div class="flashcard-content">${fc.term}</div>
          <div class="flashcard-hint">👆 Click to reveal definition</div>
        </div>
        <div class="flashcard-back">
          <div class="flashcard-label">Definition</div>
          <div class="flashcard-content">${fc.definition}</div>
          <div class="flashcard-hint">Click to see term</div>
        </div>
      </div>
    </div>
  `;
  
  document.getElementById('current-index').textContent = currentIndex + 1;
  document.getElementById('prev-btn').disabled = currentIndex === 0;
  document.getElementById('next-btn').disabled = currentIndex === flashcards.length - 1;
}

function flipCard(element) {
  element.classList.toggle('flipped');
  const container = document.getElementById('flashcard-container');
  container.dataset.flipped = element.classList.contains('flipped');
}

function prevCard() {
  if (currentIndex > 0) {
    currentIndex--;
    document.getElementById('flashcard-container').dataset.flipped = 'false';
    renderFlashcard();
  }
}

function nextCard() {
  if (currentIndex < flashcards.length - 1) {
    currentIndex++;
    document.getElementById('flashcard-container').dataset.flipped = 'false';
    renderFlashcard();
  }
}

function goToQuiz() {
  window.location.href = `quiz.html?chapter=${chapterNum}&unit=${unitNum}`;
}

function getStore(key) {
  try { return JSON.parse(localStorage.getItem(key)) || {}; }
  catch { return {}; }
}

function getState() {
  try { return JSON.parse(sessionStorage.getItem('ss_state')) || {}; }
  catch { return {}; }
}

(async function init() {
  await initFlashcards();
  document.getElementById('bc-unit').textContent = `Chapter ${chapterNum} - Unit ${unitNum}`;
  document.getElementById('card-count').textContent = flashcards.length;
  document.getElementById('total-count').textContent = flashcards.length;
  renderFlashcard();
})();
</script>
</body>
</html>
