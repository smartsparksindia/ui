<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartSpark CMS — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --purple: #7F77DD; --purple-light: #EEEDFE; --purple-dark: #3C3489;
  --teal: #1D9E75; --teal-light: #E1F5EE;
  --coral: #D85A30; --coral-light: #FAECE7;
  --amber: #BA7517; --amber-light: #FAEEDA;
  --pink: #D4537E; --pink-light: #FBEAF0;
  --blue: #378ADD; --blue-light: #E6F1FB;
  --green: #639922; --green-light: #EAF3DE;
  --bg: #FFF9F0; --card-bg: #FFFFFF;
  --text: #2C2C2A; --text-muted: #888780;
  --radius: 20px; --radius-sm: 12px;
  --error: #E84040; --success: #1D9E75;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(180deg, #FFF9F0 0%, #F6F2FF 100%);
  color: var(--text);
  overflow-x: hidden;
}
.cms-container { display: flex; min-height: 100vh; width: 100%; }
.cms-sidebar {
  background: rgba(255,255,255,0.94);
  border-right: 1px solid rgba(240,235,224,0.8);
  padding: 2rem 0;
  position: fixed;
  width: 250px;
  height: 100vh;
  overflow-y: auto;
  box-shadow: 0 0 30px rgba(127,119,221,0.06);
  backdrop-filter: blur(18px);
}
.cms-logo {
  padding: 0 1.5rem;
  margin-bottom: 2rem;
  font-family: 'Fredoka One', cursive;
  font-size: 1.4rem;
  color: var(--purple);
}
.cms-logo span { color: var(--coral); }
.cms-nav { display: flex; flex-direction: column; gap: 0.5rem; }
.cms-nav-item {
  padding: 0.9rem 1.5rem;
  text-decoration: none;
  color: var(--text-muted);
  font-weight: 700;
  font-size: 0.95rem;
  transition: background 0.2s, color 0.2s;
  display: flex;
  align-items: center;
  gap: 0.8rem;
}
.cms-nav-item:hover { background: var(--purple-light); color: var(--purple); }
.cms-nav-item.active {
  background: var(--purple);
  color: white;
  border-left: 4px solid var(--coral);
}
.cms-main {
  flex: 1;
  margin-left: 250px;
  padding: 2rem 2rem 3rem;
  max-width: calc(100vw - 250px);
}
.cms-main-inner { width: 100%; max-width: 1400px; margin: 0 auto; }
.cms-topbar {
  background: #FFFFFF;
  padding: 1.5rem 2rem;
  border: 1px solid #F1ECFF;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2rem;
  border-radius: 28px;
  box-shadow: 0 10px 35px rgba(127,119,221,0.08);
}
.cms-topbar .btn-primary { margin-left: auto; }
.cms-title {
  font-family: 'Fredoka One', cursive;
  font-size: 1.8rem;
}
.btn {
  padding: 0.8rem 1.5rem;
  border-radius: var(--radius-sm);
  border: none;
  font-weight: 800;
  cursor: pointer;
  font-size: 0.9rem;
}
.btn-primary {
  background: linear-gradient(135deg, var(--purple), #968DFF);
  color: white;
  box-shadow: 0 10px 20px rgba(127,119,221,0.22);
}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 1.4rem;
  margin-bottom: 2rem;
}
.stat-card {
  background: #FFFFFF;
  border-radius: 24px;
  padding: 1.6rem;
  border: 1px solid #F2EEFF;
  box-shadow: 0 10px 30px rgba(127,119,221,0.07);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.stat-card:hover { transform: translateY(-4px); }
.stat-value {
  font-family: 'Fredoka One', cursive;
  font-size: 2.2rem;
  color: var(--purple);
  margin-top: 0.4rem;
}
.cms-section {
  background: #FFFFFF;
  border-radius: 28px;
  padding: 2rem;
  margin-bottom: 2rem;
  border: 1px solid #F3EEFF;
  box-shadow: 0 12px 36px rgba(127,119,221,0.07);
}
.section-title {
  font-family: 'Fredoka One', cursive;
  font-size: 1.4rem;
  margin-bottom: 1rem;
}
table { width: 100%; border-collapse: collapse; }
th, td {
  padding: 1rem;
  text-align: left;
  border-bottom: 1px solid #F0EBE0;
}
.chapter-row { cursor: pointer; }
.chapter-row:hover { background: #FAF7FF; }
.activity-item {
  padding: 1rem;
  border: 1px solid #F0EBE0;
  border-radius: 16px;
  margin-bottom: 1rem;
  background: linear-gradient(to right, #ffffff, #faf7ff);
}
@media (max-width: 768px) {
  .cms-container { flex-direction: column; }
  .cms-sidebar {
    width: 100%;
    height: auto;
    position: relative;
  }
  .cms-main {
    margin-left: 0;
    max-width: 100%;
    padding: 1rem;
  }
  .stats-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="cms-container">
  <aside class="cms-sidebar">
    <div class="cms-logo">Smart<span>Spark</span> CMS</div>
  </aside>

  <main class="cms-main">
    <div class="cms-main-inner">
      <div class="cms-topbar">
        <h1 class="cms-title">Dashboard</h1>
        <button class="btn btn-primary">+ Create New Chapter</button>
      </div>
    </div>
  </main>
</div>
</body>
</html>
