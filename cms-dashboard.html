<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartSpark CMS — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --purple: #7F77DD; --purple-light: #EEEDFE; --purple-dark: #3C3489;
  --teal: #1D9E75; --teal-light: #E1F5EE;
  --coral: #D85A30; --coral-light: #FAECE7;
  --amber: #BA7517; --amber-light: #FAEEDA;
  --pink: #D4537E; --pink-light: #FBEAF0;
  --blue: #378ADD; --blue-light: #E6F1FB;
  --green: #639922; --green-light: #EAF3DE;
  --bg: #FFF9F0; --card-bg: #FFFFFF;
  --text: #2C2C2A; --text-muted: #888780;
  --radius: 20px; --radius-sm: 12px;
  --error: #E84040; --success: #1D9E75;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(180deg, #FFF9F0 0%, #F6F2FF 100%);
  color: var(--text);
  overflow-x: hidden;
}

.cms-container {
  display: flex;
  min-height: 100vh;
  width: 100%;
}

.cms-sidebar {
  background: rgba(255,255,255,0.94);
  border-right: 1px solid rgba(240,235,224,0.8);
  padding: 2rem 0;
  position: fixed;
  width: 250px;
  height: 100vh;
  overflow-y: auto;
  box-shadow: 0 0 30px rgba(127,119,221,0.06);
  backdrop-filter: blur(18px);
  display: flex;
  flex-direction: column;
}

.cms-logo {
  padding: 0 1.5rem;
  margin-bottom: 2rem;
  font-family: 'Fredoka One', cursive;
  font-size: 1.4rem;
  color: var(--purple);
}
.cms-logo span { color: var(--coral); }

.cms-nav {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  flex: 1;
}

.cms-nav-item {
  padding: 0.9rem 1.5rem;
  text-decoration: none;
  color: var(--text-muted);
  font-weight: 700;
  font-size: 0.95rem;
  transition: background 0.2s, color 0.2s;
  display: flex;
  align-items: center;
  gap: 0.8rem;
}

.cms-nav-item:hover {
  background: var(--purple-light);
  color: var(--purple);
}

.cms-nav-item.active {
  background: var(--purple);
  color: white;
  border-left: 4px solid var(--coral);
}

.cms-nav-item.logout {
  margin-top: auto;
  color: var(--error);
  border-top: 1px solid #F0EBE0;
  padding-top: 1rem;
}

.cms-nav-item.logout:hover {
  background: #FFCDD2;
  color: #C62828;
}

.cms-main {
  flex: 1;
  margin-left: 250px;
  padding: 2rem 2rem 3rem;
  max-width: calc(100vw - 250px);
}

.cms-main-inner {
  width: 100%;
  max-width: 1400px;
  margin: 0 auto;
}

.cms-topbar {
  background: #FFFFFF;
  padding: 1.5rem 2rem;
  border: 1px solid #F1ECFF;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2rem;
  border-radius: 28px;
  box-shadow: 0 10px 35px rgba(127,119,221,0.08);
}

.cms-topbar .btn-primary {
  margin-left: auto;
}

.cms-title {
  font-family: 'Fredoka One', cursive;
  font-size: 1.8rem;
}

.btn {
  padding: 0.8rem 1.5rem;
  border-radius: var(--radius-sm);
  border: none;
  font-weight: 800;
  cursor: pointer;
  font-size: 0.9rem;
  text-decoration: none;
  display: inline-block;
}

.btn-primary {
  background: linear-gradient(135deg, var(--purple), #968DFF);
  color: white;
  box-shadow: 0 10px 20px rgba(127,119,221,0.22);
  transition: all 0.2s ease;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 14px 24px rgba(127,119,221,0.28);
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 1.4rem;
  margin-bottom: 2rem;
}

.stat-card {
  background: #FFFFFF;
  border-radius: 24px;
  padding: 1.6rem;
  border: 1px solid #F2EEFF;
  box-shadow: 0 10px 30px rgba(127,119,221,0.07);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.stat-card::after {
  content: '→';
  position: absolute;
  right: 1.4rem;
  top: 1.4rem;
  font-size: 1.1rem;
  color: rgba(127,119,221,0.4);
  transition: transform 0.2s ease;
}

.stat-card:hover::after {
  transform: translateX(4px);
}

.stat-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 14px 28px rgba(127,119,221,0.12);
}

.stat-value {
  font-family: 'Fredoka One', cursive;
  font-size: 2.2rem;
  color: var(--purple);
  margin-top: 0.4rem;
}

.cms-section {
  background: #FFFFFF;
  border-radius: 28px;
  padding: 2rem;
  margin-bottom: 2rem;
  border: 1px solid #F3EEFF;
  box-shadow: 0 12px 36px rgba(127,119,221,0.07);
}

.section-title {
  font-family: 'Fredoka One', cursive;
  font-size: 1.4rem;
  margin-bottom: 1rem;
}

.activity-item {
  padding: 1rem 1rem;
  border: 1px solid #F0EBE0;
  border-radius: 16px;
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1rem;
  background: linear-gradient(to right, #ffffff, #faf7ff);
  transition: transform 0.18s ease, box-shadow 0.18s ease;
}

.activity-item:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(127,119,221,0.08);
}

.empty-state {
  text-align: center;
  padding: 2rem;
  color: var(--text-muted);
}

@media (max-width: 768px) {
  .cms-container {
    flex-direction: column;
  }

  .cms-sidebar {
    width: 100%;
    height: auto;
    position: relative;
  }

  .cms-main {
    margin-left: 0;
    max-width: 100%;
    padding: 1rem;
  }

  .stats-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .cms-section {
    padding: 1.25rem;
  }
}
</style>
</head>
<body>
<div class="cms-container">
  <aside class="cms-sidebar">
    <div class="cms-logo">Smart<span>Spark</span> CMS</div>
    <nav class="cms-nav">
      <a href="cms-dashboard.html" class="cms-nav-item active">📊 Dashboard</a>
      <a href="cms-editor.html" class="cms-nav-item">✏️ Create Chapter</a>
      <a href="cms-edit-chapter.html" class="cms-nav-item">📝 My Drafts</a>
      <a href="cms-published-chapters.html" class="cms-nav-item">📖 Edit Chapters</a>
      <a href="cms-approval-queue.html" class="cms-nav-item">✅ Approval Queue</a>
      <a href="cms-question-bank.html" class="cms-nav-item">🏦 Question Bank</a>
      <a href="cms-analytics.html" class="cms-nav-item">📈 Analytics</a>
      <a href="cms-export.html" class="cms-nav-item">💾 Backup</a>
      <a href="cms-login.html" class="cms-nav-item logout" onclick="logout()">🚪 Logout</a>
    </nav>
  </aside>

  <main class="cms-main">
    <div class="cms-main-inner">
      <div class="cms-topbar">
        <h1 class="cms-title">Dashboard</h1>
        <a href="cms-editor.html" class="btn btn-primary">+ Create New Chapter</a>
      </div>

      <div class="stats-grid">
        <div class="stat-card" onclick="window.location.href='cms-published-chapters.html'">
          <div>Published Chapters</div>
          <div class="stat-value" id="stat-published">0</div>
        </div>
        <div class="stat-card" onclick="window.location.href='cms-edit-chapter.html'">
          <div>Your Drafts</div>
          <div class="stat-value" id="stat-drafts">0</div>
        </div>
        <div class="stat-card" onclick="window.location.href='cms-approval-queue.html'">
          <div>Pending Review</div>
          <div class="stat-value" id="stat-pending">0</div>
        </div>
        <div class="stat-card" onclick="window.location.href='cms-question-bank.html'">
          <div>Total Questions</div>
          <div class="stat-value" id="stat-questions">0</div>
        </div>
      </div>

      <div class="cms-section">
        <h2 class="section-title">⏳ Pending Approvals</h2>
        <div id="pending-list"></div>
      </div>
    </div>
  </main>
</div>

<script src="data-layer.js"></script>
<script>
const user = getCurrentUser();
if (!user || !['admin', 'contributor'].includes(user.role)) {
  window.location.href = 'cms-login.html';
}

// GET DATA
const chapters = getStore('ss_chapters');
const published = Object.values(chapters).filter(ch => ch.status === 'published').sort((a, b) => new Date(b.approved_at) - new Date(a.approved_at));
const submitted = Object.values(chapters).filter(ch => ch.status === 'submitted');
const drafts = Object.values(chapters).filter(ch => ch.created_by === user.user_id && ch.status === 'draft');
const qb = getStore('ss_question_bank');

// UPDATE STATS
document.getElementById('stat-published').textContent = published.length;
document.getElementById('stat-drafts').textContent = drafts.length;
document.getElementById('stat-pending').textContent = submitted.length;
document.getElementById('stat-questions').textContent = Object.keys(qb).length;

// RENDER PENDING
const pendingList = document.getElementById('pending-list');
if (submitted.length === 0) {
  pendingList.innerHTML = '<div class="empty-state">No pending chapters for review</div>';
} else {
  pendingList.innerHTML = submitted.map(ch => `
    <div class="activity-item">
      <div>📤</div>
      <div style="flex:1;">
        <strong>${ch.title}</strong><br>
        <small>Class ${ch.class} • ${ch.subject}</small>
      </div>
      <button class="btn btn-sm btn-primary" onclick="approveChapter('${ch.chapter_id}')">Approve</button>
      <button class="btn btn-sm btn-delete" style="background:#EF5350;color:white;padding:0.5rem 1rem;font-size:0.8rem;" onclick="rejectChapter('${ch.chapter_id}')">Reject</button>
    </div>
  `).join('');
}

// FUNCTIONS
function approveChapter(id) {
  if (confirm('Publish this chapter?')) {
    const ch = getFromStore('ss_chapters', id);
    if (ch) {
      const newVersion = (ch.current_version || 0) + 1;
      if (!ch.versions) ch.versions = [];
      ch.versions.push({
        version: newVersion,
        status: 'published',
        published_at: new Date().toISOString()
      });
      ch.current_version = newVersion;
      ch.status = 'published';
      ch.approved_at = new Date().toISOString();
      ch.approved_by = user.user_id;
      addToStore('ss_chapters', id, ch);
      location.reload();
    }
  }
}

function rejectChapter(id) {
  const feedback = prompt('Rejection feedback:');
  if (feedback) {
    const ch = getFromStore('ss_chapters', id);
    if (ch) {
      ch.status = 'draft';
      ch.rejection_feedback = feedback;
      addToStore('ss_chapters', id, ch);
      location.reload();
    }
  }
}

function logout() {
  logoutUser();
  window.location.href = 'cms-login.html';
}

function getFromStore(key, id) {
  try {
    const store = JSON.parse(localStorage.getItem(key)) || {};
    return store[id];
  } catch {
    return null;
  }
}

function addToStore(key, id, data) {
  try {
    const store = JSON.parse(localStorage.getItem(key)) || {};
    store[id] = data;
    localStorage.setItem(key, JSON.stringify(store));
  } catch (e) {
    console.error('Storage error:', e);
  }
}

function getStore(key) {
  try {
    return JSON.parse(localStorage.getItem(key)) || {};
  } catch {
    return {};
  }
}
</script>
</body>
</html>
