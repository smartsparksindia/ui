<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartSpark — Learn</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --purple: #7F77DD; --teal: #1D9E75; --coral: #D85A30;
  --amber: #BA7517; --bg: #FFF9F0; --text: #2C2C2A; --text-muted: #888780;
  --radius: 20px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

nav { background: white; padding: 1rem 2.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #F0EBE0; }
.logo { font-family: 'Fredoka One', cursive; font-size: 2rem; color: var(--purple); text-decoration: none; }
.logo span { color: var(--coral); }

.main { max-width: 700px; margin: 0 auto; padding: 2rem; }

.stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 2rem; }
.stat-box { background: white; border-radius: var(--radius); padding: 1rem; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
.stat-label { font-size: 0.75rem; text-transform: uppercase; font-weight: 800; color: var(--text-muted); }
.stat-value { font-family: 'Fredoka One', cursive; font-size: 1.8rem; margin-top: 0.3rem; }

.phase-box { background: white; border-radius: var(--radius); padding: 2rem; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
.phase-title { font-family: 'Fredoka One', cursive; font-size: 1.5rem; margin-bottom: 1rem; }

/* PHASE 1: CHOICE */
.choice-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.choice-btn { padding: 1.5rem; border: none; border-radius: var(--radius); font-weight: 800; cursor: pointer; font-size: 1rem; transition: all 0.2s; box-shadow: 0 4px 0 rgba(0,0,0,0.15); }
.choice-btn:hover { transform: translateY(-4px); }
.choice-btn:active { transform: translateY(0); }
.btn-revision { background: var(--teal); color: white; }
.btn-quiz { background: var(--coral); color: white; }

/* PHASE 2: FLASHCARDS */
.flashcard { background: linear-gradient(135deg, white 60%, #f5f5f5); border-radius: var(--radius); padding: 2.5rem; text-align: center; min-height: 280px; display: flex; flex-direction: column; justify-content: center; cursor: pointer; border: 3px solid #F0EBE0; }
.flashcard:hover { border-color: var(--teal); }
.flashcard-label { font-size: 0.75rem; text-transform: uppercase; font-weight: 800; color: var(--text-muted); margin-bottom: 1rem; letter-spacing: 0.05em; }
.flashcard-text { font-size: 1.4rem; font-weight: 700; white-space: pre-wrap; word-break: break-word; }
.flashcard-hint { font-size: 0.85rem; color: var(--text-muted); margin-top: 1.5rem; font-style: italic; }

.fc-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; }
.fc-progress { font-size: 0.9rem; font-weight: 700; color: var(--text-muted); }
.fc-btn { padding: 0.8rem 1.5rem; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; background: var(--purple); color: white; box-shadow: 0 3px 0 #3C3489; }
.fc-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #3C3489; }

/* PHASE 3: QUIZ */
.question-box { }
.q-number { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem; font-weight: 700; }
.question-text { font-family: 'Fredoka One', cursive; font-size: 1.4rem; margin-bottom: 2rem; color: var(--text); }
.options { display: flex; flex-direction: column; gap: 0.8rem; }
.option { padding: 1.2rem; border: 2px solid #F0EBE0; border-radius: 12px; cursor: pointer; transition: all 0.2s; font-weight: 700; text-align: left; background: white; }
.option:hover { background: #FAFAF8; border-color: var(--purple); }
.option.selected { background: var(--purple); color: white; border-color: var(--purple); }
.option.correct { background: var(--teal); color: white; border-color: var(--teal); animation: pulse 0.6s; }
.option.wrong { background: var(--coral); color: white; border-color: var(--coral); }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

.explanation { background: #EEEDFE; border-left: 4px solid var(--purple); padding: 1rem; border-radius: 12px; margin-top: 1.5rem; font-size: 0.95rem; text-align: left; }

/* PHASE 4: RESULTS */
.final-score { font-family: 'Fredoka One', cursive; font-size: 3.5rem; color: var(--teal); margin: 1.5rem 0; }
.streak-banner { background: linear-gradient(135deg, #FFD700, #FFA500); color: #333; padding: 2rem; border-radius: var(--radius); margin: 2rem 0; font-weight: 800; font-size: 1.3rem; box-shadow: 0 4px 15px rgba(255,165,0,0.3); }
.milestone-badge { font-size: 4rem; margin: 1.5rem 0; animation: bounce 0.8s infinite; }
@keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }

.next-btn { width: 100%; padding: 1.2rem; margin-top: 1.5rem; background: var(--teal); color: white; border: none; border-radius: var(--radius); font-weight: 800; cursor: pointer; font-size: 1rem; box-shadow: 0 4px 0 #0F6B52; }
.next-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #0F6B52; }

footer { background: var(--text); color: white; text-align: center; padding: 2rem; margin-top: 3rem; }

@media(max-width:600px) { 
  nav { padding: 1rem; } 
  .main { padding: 1rem; } 
  .choice-buttons { grid-template-columns: 1fr; } 
  .final-score { font-size: 2.5rem; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Smart<span>Spark</span> ⚡</a>
  <div style="display:flex;gap:1.5rem;align-items:center;">
    <div style="font-weight:800;color:var(--text);background:var(--amber-light);padding:0.5rem 1rem;border-radius:50px;">+<span id="session-score">0</span> pts</div>
    <a href="chapters.html" style="color:var(--text-muted);text-decoration:none;font-weight:700;">← Back</a>
  </div>
</nav>

<div class="main">
  <div class="stats">
    <div class="stat-box">
      <div class="stat-label">🔥 Streak</div>
      <div class="stat-value" id="streak-display">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">⭐ Total</div>
      <div class="stat-value" id="total-pts">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">🎯 Target</div>
      <div class="stat-value" id="target">100</div>
    </div>
  </div>

  <!-- PHASE 1: CHOICE (Revision vs Quiz) -->
  <div id="phase-choice" class="phase-box" style="display:none;">
    <h2 class="phase-title" id="chapter-title">Chapter Title</h2>
    <p style="color:var(--text-muted);margin-bottom:1.5rem;font-weight:600;">How would you like to learn?</p>
    <div class="choice-buttons">
      <button class="choice-btn btn-revision" id="btn-revision" onclick="startRevision()" style="display:none;">
        <div style="font-size:2rem;margin-bottom:0.5rem;">🃏</div>
        Review Flashcards
      </button>
      <button class="choice-btn btn-quiz" onclick="startQuiz()">
        <div style="font-size:2rem;margin-bottom:0.5rem;">❓</div>
        Take Quiz
      </button>
    </div>
  </div>

  <!-- PHASE 2: FLASHCARDS -->
  <div id="phase-flashcards" class="phase-box" style="display:none;">
    <h2 class="phase-title">📚 Revision</h2>
    <div id="fc-container"></div>
    <div class="fc-nav">
      <div class="fc-progress"><span id="fc-current">1</span> / <span id="fc-total">10</span></div>
      <button class="fc-btn" id="fc-next">Next 🔜</button>
    </div>
  </div>

  <!-- PHASE 3: QUIZ -->
  <div id="phase-quiz" class="phase-box" style="display:none;">
    <div id="quiz-container"></div>
  </div>

  <!-- PHASE 4: RESULTS -->
  <div id="phase-results" class="phase-box" style="display:none;">
    <h2 class="phase-title">🎉 Quiz Complete!</h2>
    <div class="final-score" id="final-score">0 / 0</div>
    <div id="streak-banner"></div>
    <div class="milestone-badge" id="milestone"></div>
    <p id="result-message" style="font-size:1.1rem;margin:1rem 0;font-weight:700;"></p>
    <button class="next-btn" onclick="goBack()">← Back to Chapters</button>
  </div>
</div>

<footer>
  <p>SmartSpark — Learn at your pace! 🚀</p>
</footer>

<script src="data-layer.js"></script>
<script>
const state = getState();
const chapterId = state.chapter;
const user = getCurrentUser();

if (!user || !chapterId) {
  window.location.href = 'chapters.html';
}

let chapter = getFromStore('ss_chapters', chapterId);

// Check if chapter exists
if (!chapter) {
  console.error('Chapter not found:', chapterId);
  alert('Failed to load chapter. Please go back and select again.');
  window.location.href = 'chapters.html';
}

let flashcards = [];
let questions = [];
let currentPhase = 'choice';
let sessionScore = 0;
let correctAnswers = 0;
let totalQuestions = 0;
let fcIndex = 0;
let revisionViewed = false;  // Track if user viewed flashcards before quiz

// ─────────────────────────────────────────────────────────────────
// INITIALIZATION
// ─────────────────────────────────────────────────────────────────

function init() {
  // Initialize user progress if it doesn't exist
  const currentUser = getCurrentUser();
  if (currentUser) {
    let progress = getUserProgress(currentUser.user_id);
    if (!progress) {
      // Create progress record if it doesn't exist
      console.log('Creating user progress for:', currentUser.user_id);
      initUserProgress(currentUser.user_id, currentUser.username, currentUser.class);
    }
  }
  
  flashcards = getChapterFlashcards(chapterId);
  questions = getChapterQuestions(chapterId);
  totalQuestions = questions.length;
  
  console.log('Learn.html init:', { chapterId, chapter: chapter?.title, flashcards: flashcards.length, questions: questions.length });
  
  document.getElementById('chapter-title').textContent = chapter.title;
  document.getElementById('target').textContent = totalQuestions * 20;  // 20 pts per question
  document.getElementById('total-pts').textContent = getTotalPoints();
  document.getElementById('streak-display').textContent = getStreak();
  
  showPhase('choice');
  
  // Show revision button ONLY if flashcards exist
  if (flashcards.length > 0) {
    document.getElementById('btn-revision').style.display = 'block';
  }
}

function showPhase(phase) {
  document.getElementById('phase-choice').style.display = 'none';
  document.getElementById('phase-flashcards').style.display = 'none';
  document.getElementById('phase-quiz').style.display = 'none';
  document.getElementById('phase-results').style.display = 'none';
  document.getElementById(`phase-${phase}`).style.display = 'block';
  currentPhase = phase;
}

// ─────────────────────────────────────────────────────────────────
// PHASE 2: FLASHCARDS (Revision)
// ─────────────────────────────────────────────────────────────────

function startRevision() {
  const currentUser = getCurrentUser();
  if (currentUser) {
    recordFlashcardView(currentUser.user_id, chapterId);
    revisionViewed = true;  // Mark that user viewed flashcards
  }
  fcIndex = 0;
  renderFlashcard();
  showPhase('flashcards');
}

function renderFlashcard() {
  if (fcIndex >= flashcards.length) {
    startQuiz();
    return;
  }
  
  const fc = flashcards[fcIndex];
  const container = document.getElementById('fc-container');
  container.innerHTML = `
    <div class="flashcard" id="card" onclick="flipCard()">
      <div style="display:none;" class="flashcard-back" id="back">
        <div class="flashcard-label">Definition</div>
        <div class="flashcard-text">${fc.definition}</div>
      </div>
      <div id="front">
        <div class="flashcard-label">Term</div>
        <div class="flashcard-text">${fc.term}</div>
        <div class="flashcard-hint">👆 Click to reveal</div>
      </div>
    </div>
  `;
  
  document.getElementById('fc-current').textContent = fcIndex + 1;
  document.getElementById('fc-total').textContent = flashcards.length;
  
  const nextBtn = document.getElementById('fc-next');
  nextBtn.textContent = fcIndex === flashcards.length - 1 ? 'Start Quiz ▶' : 'Next 🔜';
  nextBtn.onclick = () => {
    document.getElementById('front').style.display = 'block';
    document.getElementById('back').style.display = 'none';
    fcIndex++;
    renderFlashcard();
  };
}

function flipCard() {
  const front = document.getElementById('front');
  const back = document.getElementById('back');
  front.style.display = front.style.display === 'none' ? 'block' : 'none';
  back.style.display = back.style.display === 'none' ? 'block' : 'none';
}

// ─────────────────────────────────────────────────────────────────
// PHASE 3: QUIZ
// ─────────────────────────────────────────────────────────────────

function startQuiz() {
  console.log('Starting quiz with', questions.length, 'questions');
  
  if (questions.length === 0) {
    console.error('No questions found for this chapter!');
    showPhase('results');
    renderResults();
    return;
  }
  
  let qIndex = 0;
  const container = document.getElementById('quiz-container');
  
  function renderQuestion() {
    if (qIndex >= questions.length) {
      showPhase('results');
      renderResults();
      return;
    }
    
    const q = questions[qIndex];
    let answered = false;
    
    container.innerHTML = `
      <div class="question-box">
        <div class="q-number">Question ${qIndex + 1} of ${questions.length}</div>
        <div class="question-text">${q.question_text}</div>
        <div class="options" id="options"></div>
        <div id="next-container" style="display:none;margin-top:2rem;"></div>
      </div>
    `;
    
    const optionsDiv = document.getElementById('options');
    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option';
      btn.textContent = opt;
      btn.onclick = () => {
        if (answered) return;
        answered = true;
        
        const isCorrect = i === q.correct_option_index;
        
        if (isCorrect) {
          btn.classList.add('correct');
          sessionScore += 20;  // ⭐ 20 POINTS PER CORRECT!
          correctAnswers++;
          const currentUser = getCurrentUser();
          if (currentUser) recordQuizAttempt(currentUser.user_id, chapterId, q.question_id, true, revisionViewed);
        } else {
          btn.classList.add('wrong');
          const correct = document.querySelectorAll('.option')[q.correct_option_index];
          correct.classList.add('correct');
          const currentUser = getCurrentUser();
          if (currentUser) recordQuizAttempt(currentUser.user_id, chapterId, q.question_id, false, revisionViewed);
        }
        
        document.querySelectorAll('.option').forEach(b => b.style.pointerEvents = 'none');
        
        optionsDiv.innerHTML += `
          <div class="explanation">
            <strong>${isCorrect ? '✅ Correct!' : '❌ Try again'}</strong><br>
            ${q.explanation}
          </div>
        `;
        
        document.getElementById('session-score').textContent = sessionScore;
        
        // Show Next button
        const nextContainer = document.getElementById('next-container');
        nextContainer.style.display = 'block';
        const nextBtn = document.createElement('button');
        nextBtn.className = 'choice-btn btn-quiz';
        nextBtn.textContent = qIndex === questions.length - 1 ? 'Finish Quiz ✓' : 'Next Question →';
        nextBtn.style.marginTop = '1rem';
        nextBtn.onclick = () => {
          qIndex++;
          renderQuestion();
        };
        nextContainer.appendChild(nextBtn);
      };
      optionsDiv.appendChild(btn);
    });
  }
  
  renderQuestion();
  showPhase('quiz');
}

// ─────────────────────────────────────────────────────────────────
// PHASE 4: RESULTS & GAMIFICATION
// ─────────────────────────────────────────────────────────────────

function renderResults() {
  const accuracy = totalQuestions > 0 ? Math.round((correctAnswers / totalQuestions) * 100) : 0;
  const isAllCorrect = correctAnswers === totalQuestions && totalQuestions > 0;
  
  const currentUser = getCurrentUser();
  
  // Mark chapter complete if 100%
  if (isAllCorrect && currentUser) {
    markChapterComplete(currentUser.user_id, chapterId);
  }
  
  // Points are already saved via recordQuizAttempt() calls during quiz
  // Just verify they're persisted
  if (currentUser) {
    const progress = getUserProgress(currentUser.user_id);
    console.log('Quiz completed. User progress:', progress?.total_points);
  }
  
  document.getElementById('final-score').textContent = `${correctAnswers} / ${totalQuestions}`;
  document.getElementById('session-score').textContent = sessionScore;
  document.getElementById('total-pts').textContent = getTotalPoints();
  document.getElementById('streak-display').textContent = getStreak();
  
  // 🔥 WINNING STREAK MESSAGE
  let streakHtml = '';
  if (isAllCorrect) {
    streakHtml = `<div class="streak-banner">🔥🏆 PERFECT SCORE! All answers correct! 🏆🔥</div>`;
  } else if (correctAnswers >= totalQuestions * 0.9) {
    streakHtml = `<div class="streak-banner">⭐ Amazing! ${accuracy}% accuracy - That's impressive!</div>`;
  } else if (correctAnswers >= totalQuestions * 0.7) {
    streakHtml = `<div class="streak-banner">👏 Great job! ${accuracy}% - Keep practicing!</div>`;
  } else if (correctAnswers > 0) {
    streakHtml = `<div class="streak-banner">📖 Good start! ${accuracy}% - Review and retry!</div>`;
  }
  document.getElementById('streak-banner').innerHTML = streakHtml;
  
  // 👑 FIBONACCI MILESTONE REWARDS
  // Series: 100, 200, 300, 500, 800, 1300, 2100, 3400, 5500...
  const milestones = [100, 200, 300, 500, 800, 1300, 2100, 3400, 5500];
  const newTotal = getTotalPoints();
  const oldTotal = newTotal - sessionScore;
  let milestone = '';
  
  milestones.forEach(m => {
    if (oldTotal < m && newTotal >= m) {
      milestone = getMilestoneEmoji(m);
    }
  });
  
  if (milestone) {
    document.getElementById('milestone').innerHTML = `${milestone}<br><strong style="font-size:1.3rem;color:var(--text);">Milestone Unlocked!</strong>`;
  }
  
  // RESULT MESSAGE
  let message = '';
  if (accuracy === 100) message = '🌟 Perfect! You\'ve completely mastered this chapter!';
  else if (accuracy >= 80) message = '⭐ Excellent! Your knowledge is solid!';
  else if (accuracy >= 60) message = '👍 Good effort! Review and try again!';
  else message = '📖 Let\'s review the material and try again!';
  
  document.getElementById('result-message').textContent = message;
}

// ─────────────────────────────────────────────────────────────────
// HELPER FUNCTIONS
// ─────────────────────────────────────────────────────────────────

function getChapterFlashcards(cId) {
  const ch = getFromStore('ss_chapters', cId);
  if (!ch) return [];
  return (ch.flashcard_ids || [])
    .map(fId => getFromStore('ss_flashcards', fId))
    .filter(Boolean);
}

function getChapterQuestions(cId) {
  const ch = getFromStore('ss_chapters', cId);
  if (!ch) return [];
  return (ch.question_ids || [])
    .map(qId => getFromStore('ss_question_bank', qId))
    .filter(Boolean);
}

function getTotalPoints() {
  const currentUser = getCurrentUser();
  if (!currentUser) return 0;
  const progress = getUserProgress(currentUser.user_id);
  return progress?.total_points || 0;
}

function getStreak() {
  const currentUser = getCurrentUser();
  if (!currentUser) return 0;
  const progress = getUserProgress(currentUser.user_id);
  return progress?.current_streak || 0;
}

function updateTotalScore(points) {
  const currentUser = getCurrentUser();
  if (!currentUser) return;
  const progress = getUserProgress(currentUser.user_id);
  if (progress) {
    progress.total_points = (progress.total_points || 0) + points;
    addToStore('ss_user_progress', currentUser.user_id, progress);
  }
}

function getMilestoneEmoji(points) {
  const emojis = {
    100: '🥉', 200: '🥈', 300: '🥇', 500: '👑', 800: '⭐', 
    1300: '🌟', 2100: '💎', 3400: '🏆', 5500: '👑'
  };
  return emojis[points] || '🎖️';
}

function goBack() {
  window.location.href = 'chapters.html';
}

function getFromStore(key, id) {
  try {
    const store = JSON.parse(localStorage.getItem(key)) || {};
    return store[id];
  } catch {
    return null;
  }
}

function addToStore(key, id, data) {
  try {
    const store = JSON.parse(localStorage.getItem(key)) || {};
    store[id] = data;
    localStorage.setItem(key, JSON.stringify(store));
  } catch (e) {
    console.error('Storage error:', e);
  }
}

function getState() {
  try {
    return JSON.parse(sessionStorage.getItem('ss_state')) || {};
  } catch {
    return {};
  }
}

// ─────────────────────────────────────────────────────────────────
// START
// ─────────────────────────────────────────────────────────────────

init();
</script>
</body>
</html>
