<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartSpark — Subjects</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --purple: #7F77DD; --purple-light: #EEEDFE;
  --teal: #1D9E75; --teal-light: #E1F5EE;
  --coral: #D85A30; --coral-light: #FAECE7;
  --amber: #BA7517; --amber-light: #FAEEDA;
  --pink: #D4537E; --pink-light: #FBEAF0;
  --blue: #378ADD; --blue-light: #E6F1FB;
  --green: #639922; --green-light: #EAF3DE;
  --bg: #FFF9F0; --card-bg: #FFFFFF;
  --text: #2C2C2A; --text-muted: #888780;
  --radius: 20px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

nav {
  background: white; padding: 1rem 2.5rem;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 3px solid #F0EBE0;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.logo { font-family: 'Fredoka One', cursive; font-size: 2rem; color: var(--purple); text-decoration: none; }
.logo span { color: var(--coral); }
.nav-right { display: flex; align-items: center; gap: 1rem; }
.score-pill { background: var(--amber-light); color: var(--amber); padding: 0.4rem 1rem; border-radius: 50px; font-weight: 800; font-size: 0.9rem; }
.back-btn { color: var(--text-muted); text-decoration: none; font-weight: 700; font-size: 0.9rem; }

.breadcrumb { display: flex; align-items: center; gap: 0.5rem; padding: 1.5rem 2.5rem 0; font-size: 0.85rem; font-weight: 700; color: var(--text-muted); }
.breadcrumb a { color: var(--purple); text-decoration: none; cursor: pointer; }

.header { text-align: center; padding: 2.5rem 2rem; }
.badge { display: inline-block; padding: 0.4rem 1.4rem; border-radius: 50px; font-weight: 800; font-size: 0.9rem; margin-bottom: 1rem; }
.header h1 { font-family: 'Fredoka One', cursive; font-size: 2.2rem; margin-bottom: 0.6rem; }
.header p { color: var(--text-muted); font-size: 0.95rem; font-weight: 600; }

.subjects-wrap { max-width: 950px; margin: 0 auto; padding: 0 2rem 4rem; }
.subjects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }

.subject-card {
  background: white; border-radius: var(--radius);
  padding: 2rem 1.5rem; text-align: center;
  cursor: pointer; text-decoration: none; color: var(--text);
  display: block; border: 3px solid transparent;
  transition: transform 0.2s, box-shadow 0.2s;
  position: relative; overflow: hidden;
}
.subject-card:hover { transform: translateY(-6px); box-shadow: 0 12px 30px rgba(0,0,0,0.1); }

.s-science { border-color: #9FE1CB; background: linear-gradient(135deg,white 60%,var(--teal-light)); }
.s-science .s-name { color: var(--teal); }
.s-maths { border-color: #AFA9EC; background: linear-gradient(135deg,white 60%,var(--purple-light)); }
.s-maths .s-name { color: var(--purple); }
.s-english { border-color: #F4C0D1; background: linear-gradient(135deg,white 60%,var(--pink-light)); }
.s-english .s-name { color: var(--pink); }
.s-social { border-color: #FAC775; background: linear-gradient(135deg,white 60%,var(--amber-light)); }
.s-social .s-name { color: var(--amber); }

.s-icon { font-size: 3rem; display: block; margin-bottom: 1rem; }
.s-name { font-family: 'Fredoka One', cursive; font-size: 1.35rem; margin-bottom: 0.3rem; }
.s-count { font-size: 0.85rem; font-weight: 700; color: var(--text-muted); }
.s-progress { margin-top: 1rem; height: 4px; background: rgba(0,0,0,0.08); border-radius: 50px; overflow: hidden; display: none; }
.s-progress.show { display: block; }
.s-progress-fill { height: 100%; border-radius: 50px; transition: width 0.6s; }

footer { background: var(--text); color: white; text-align: center; padding: 2.5rem 2rem; }
footer p { color: rgba(255,255,255,0.45); font-size: 0.88rem; margin-top: 0.4rem; }

@media(max-width:600px) { nav { padding: 1rem 1.2rem; } .subjects-grid { grid-template-columns: repeat(2,1fr); } }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Smart<span>Spark</span> ⚡</a>
  <div class="nav-right">
    <div class="score-pill">⭐ <span id="total-score">0</span> pts</div>
    <a href="index.html" class="back-btn">← Back</a>
  </div>
</nav>

<div class="breadcrumb">
  <a href="index.html">Home</a> <span>›</span>
  <span id="bc-year">Class 6</span>
</div>

<div class="header">
  <div class="badge" id="badge" style="background:var(--purple-light);color:var(--purple);">Class 6</div>
  <h1>Choose a Subject</h1>
  <p>Pick a subject to explore chapters and start learning!</p>
</div>

<div class="subjects-wrap">
  <div class="subjects-grid" id="subjects-grid"></div>
</div>

<footer>
  <div style="font-family:'Fredoka One',cursive;font-size:1.8rem;margin-bottom:0.4rem;">Smart<span style="color:#F0997B;">Spark</span> ⚡</div>
  <p>Free learning for Indian students 🇮🇳</p>
</footer>

<script src="data-layer.js"></script>
<script>
// GET SELECTED YEAR FROM STATE (NOT HARDCODED!)
const state = getState();
const year = state.year || 6;

// UPDATE BREADCRUMB & BADGE DYNAMICALLY
document.getElementById('bc-year').textContent = `Class ${year}`;
document.getElementById('badge').textContent = `Class ${year}`;

// COLOR MAP FOR SUBJECTS
const colorMap = {
  'Science': { icon: '🔬', color: '#1D9E75', cls: 's-science' },
  'Maths': { icon: '🔢', color: '#7F77DD', cls: 's-maths' },
  'English': { icon: '📚', color: '#D4537E', cls: 's-english' },
  'Social Science': { icon: '🌍', color: '#BA7517', cls: 's-social' }
};

// ALWAYS SHOW ALL 4 SUBJECTS (EVEN IF NO CHAPTERS)
const subjects = ['Science', 'Maths', 'English', 'Social Science'];
const grid = document.getElementById('subjects-grid');

subjects.forEach(subject => {
  const meta = colorMap[subject];
  
  // GET CHAPTERS FOR THIS SUBJECT
  const chapters = getChaptersForYearSubject(year, subject);
  
  // CALCULATE PROGRESS
  let done = 0;
  let pct = 0;
  
  if (chapters.length > 0) {
    const user = getCurrentUser();
    if (user) {
      const progress = getUserProgress(user.user_id);
      if (progress) {
        done = chapters.filter(ch => {
          const chProgress = progress.chapters_progress[ch.chapter_id];
          return chProgress && chProgress.status === 'completed';
        }).length;
        pct = Math.round((done / chapters.length) * 100);
      }
    }
  }

  // CREATE CARD
  const card = document.createElement('a');
  card.href = '#';
  card.className = `subject-card ${meta.cls}`;
  
  // BUILD CARD HTML
  let cardHTML = `
    <span class="s-icon">${meta.icon}</span>
    <div class="s-name">${subject}</div>
  `;
  
  // SHOW CHAPTER COUNT OR "Coming soon"
  if (chapters.length > 0) {
    cardHTML += `<div class="s-count">${chapters.length} chapter${chapters.length !== 1 ? 's' : ''}</div>`;
  } else {
    cardHTML += `<div class="s-count">Coming soon</div>`;
  }
  
  // SHOW PROGRESS BAR ONLY IF CHAPTERS EXIST
  if (chapters.length > 0) {
    cardHTML += `
      <div class="s-progress show">
        <div class="s-progress-fill" style="background:${meta.color};width:${pct}%"></div>
      </div>
    `;
    if (done > 0) {
      cardHTML += `<div style="font-size:0.75rem;color:${meta.color};font-weight:700;margin-top:0.5rem;">${done}/${chapters.length} done</div>`;
    }
  }
  
  card.innerHTML = cardHTML;
  
  // NAVIGATE TO CHAPTERS PAGE (EVEN IF NO CHAPTERS YET)
  card.onclick = (e) => {
    e.preventDefault();
    setState({ subject });
    window.location.href = 'chapters.html';
  };
  
  grid.appendChild(card);
});

// UPDATE SCORE
document.getElementById('total-score').textContent = getTotalScore();

// HELPER FUNCTION: GET CHAPTERS
function getChaptersForYearSubject(year, subject) {
  const chapters = getStore('ss_chapters');
  return Object.values(chapters).filter(ch => 
    ch.class === parseInt(year) && ch.subject === subject && ch.status === 'published'
  );
}

// HELPER FUNCTION: GET TOTAL SCORE
function getTotalScore() {
  const user = getCurrentUser();
  if (!user) return 0;
  const progress = getUserProgress(user.user_id);
  return progress?.total_points || 0;
}

function getState() {
  try {
    return JSON.parse(sessionStorage.getItem('ss_state')) || {};
  } catch {
    return {};
  }
}

function setState(patch) {
  const s = { ...getState(), ...patch };
  sessionStorage.setItem('ss_state', JSON.stringify(s));
  return s;
}
</script>
</body>
</html>
