<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartSpark — Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root { --purple: #7F77DD; --teal: #1D9E75; --coral: #D85A30; --amber: #BA7517; --bg: #FFF9F0; --text: #2C2C2A; --text-muted: #888780; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

nav { background: white; padding: 1rem 2.5rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid #F0EBE0; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.logo { font-family: 'Fredoka One', cursive; font-size: 2rem; color: var(--purple); text-decoration: none; }
.logo span { color: var(--coral); }
.nav-right { display: flex; align-items: center; gap: 1rem; }
.score-pill { background: var(--amber-light); color: var(--amber); padding: 0.4rem 1rem; border-radius: 50px; font-weight: 800; }
.back-btn { color: var(--text-muted); text-decoration: none; font-weight: 700; }

.breadcrumb { padding: 1.5rem 2.5rem 0; font-size: 0.85rem; color: var(--text-muted); }
.breadcrumb a { color: var(--purple); text-decoration: none; }

.header { text-align: center; padding: 2.5rem 2rem; }
.header h1 { font-family: 'Fredoka One', cursive; font-size: 2.2rem; margin-bottom: 0.6rem; }
.header p { color: var(--text-muted); font-weight: 600; }

.quiz-wrap { max-width: 800px; margin: 0 auto; padding: 0 2rem 4rem; }

.progress-bar { width: 100%; height: 8px; background: #F0EBE0; border-radius: 10px; margin-bottom: 2rem; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--teal)); transition: width 0.3s; }

.question-card {
  background: white;
  border-radius: 20px;
  padding: 2rem;
  margin-bottom: 2rem;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}

.question-number { font-size: 0.9rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.8rem; }
.question-text { font-family: 'Fredoka One', cursive; font-size: 1.3rem; color: var(--text); margin-bottom: 1.5rem; }

.options { display: flex; flex-direction: column; gap: 1rem; }

.option {
  padding: 1rem 1.2rem;
  border: 2px solid #F0EBE0;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 0.8rem;
}

.option:hover {
  border-color: var(--purple);
  background: var(--bg);
}

.option input[type="radio"] {
  cursor: pointer;
  width: 20px;
  height: 20px;
}

.option.correct {
  border-color: #4CAF50;
  background: #E8F5E9;
}

.option.incorrect {
  border-color: #F44336;
  background: #FFEBEE;
}

.explanation {
  background: #F5F5F5;
  border-left: 4px solid var(--teal);
  padding: 1.2rem;
  border-radius: 8px;
  margin-top: 1.5rem;
  display: none;
}

.explanation.show {
  display: block;
}

.explanation-label {
  font-weight: 800;
  font-size: 0.85rem;
  color: var(--teal);
  text-transform: uppercase;
  margin-bottom: 0.5rem;
}

.explanation-text {
  color: var(--text);
  line-height: 1.6;
  font-size: 0.95rem;
}

.controls {
  display: flex;
  gap: 1rem;
  justify-content: space-between;
  margin-top: 2rem;
}

.btn {
  padding: 0.9rem 1.8rem;
  border: none;
  border-radius: 12px;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 0.95rem;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-primary {
  background: var(--purple);
  color: white;
}

.btn-primary:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(127, 119, 221, 0.2);
}

.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.results {
  background: white;
  border-radius: 20px;
  padding: 2rem;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}

.results-score { font-family: 'Fredoka One', cursive; font-size: 3rem; color: var(--purple); margin-bottom: 1rem; }
.results-percentage { font-size: 1.4rem; font-weight: 800; color: var(--text); margin-bottom: 0.5rem; }
.results-message { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 2rem; }

.btn-back {
  background: var(--teal);
  color: white;
}

.btn-back:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(29, 158, 117, 0.2);
}

.empty-state {
  text-align: center;
  padding: 3rem 2rem;
  color: var(--text-muted);
}

footer { background: var(--text); color: white; text-align: center; padding: 2.5rem 2rem; }
footer p { color: rgba(255,255,255,0.45); margin-top: 0.4rem; }

@media(max-width: 600px) {
  .controls {
    flex-direction: column;
  }

  .btn {
    width: 100%;
  }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Smart<span>Spark</span> ⚡</a>
  <div class="nav-right">
    <div class="score-pill">⭐ <span id="session-score">0</span> pts</div>
    <a href="chapters.html" class="back-btn">← Chapters</a>
  </div>
</nav>

<div class="breadcrumb">
  <a href="index.html">Home</a> › <a href="chapters.html">Chapters</a> › <span id="bc-unit">Unit 1</span>
</div>

<div class="header">
  <h1>❓ Quiz</h1>
  <p id="header-p">Test your knowledge</p>
</div>

<div class="quiz-wrap">
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill"></div>
  </div>

  <div id="quiz-container"></div>

  <div id="results-container" style="display:none;"></div>
</div>

<footer>
  <div style="font-family:'Fredoka One',cursive;font-size:1.8rem;margin-bottom:0.4rem;">Smart<span style="color:#F0997B;">Spark</span> ⚡</div>
  <p>Test yourself and learn better 🇮🇳</p>
</footer>

<script src="data-layer.js"></script>
<script>
const urlParams = new URLSearchParams(window.location.search);
const chapterNum = parseInt(urlParams.get('chapter'));
const unitNum = parseInt(urlParams.get('unit'));

// Get all questions and filter by chapter/unit
const allQuestions = getStore('ss_question_bank');
const state = getState();
const year = state.year || 6;
const subject = state.subject || 'Science';

// Get questions for this chapter/unit
// Questions are divided into units by index (5 per unit)
const relevantQuestions = Object.values(allQuestions).filter(q => q.class === year && q.subject === subject);

// Filter by chapter (extract from topic)
const chapterQuestions = relevantQuestions.filter(q => {
  if (q.chapter) return q.chapter === chapterNum;
  if (q.topic && q.topic.includes('Chapter')) {
    const match = q.topic.match(/Chapter\s+(\d+)/i);
    if (match) return parseInt(match[1]) === chapterNum;
  }
  return false;
});

// Divide questions into units (5 questions per unit)
const questionsPerUnit = 5;
const questions = [];
chapterQuestions.forEach((q, idx) => {
  const qUnitNum = Math.floor(idx / questionsPerUnit) + 1;
  if (qUnitNum === unitNum) {
    questions.push(q);
  }
});

document.getElementById('bc-unit').textContent = `Chapter ${chapterNum} - Unit ${unitNum}`;

let currentQuestion = 0;
let sessionScore = 0;
let answers = {};

function renderQuestion() {
  const container = document.getElementById('quiz-container');
  
  if (questions.length === 0) {
    container.innerHTML = '<div class="empty-state"><h3>No questions</h3><p>Check back later for content!</p></div>';
    document.querySelector('.controls').style.display = 'none';
    return;
  }

  if (currentQuestion >= questions.length) {
    showResults();
    return;
  }

  const q = questions[currentQuestion];
  const progress = ((currentQuestion + 1) / questions.length) * 100;
  document.getElementById('progress-fill').style.width = progress + '%';

  container.innerHTML = `
    <div class="question-card">
      <div class="question-number">Question ${currentQuestion + 1} of ${questions.length}</div>
      <div class="question-text">${q.question_text}</div>
      <div class="options" id="options">
        ${q.options.map((opt, i) => `
          <label class="option" data-index="${i}" onclick="selectOption(${i})">
            <input type="radio" name="option" value="${i}" ${answers[currentQuestion] === i ? 'checked' : ''}>
            <span>${opt}</span>
          </label>
        `).join('')}
      </div>
      <div class="explanation" id="explanation">
        <div class="explanation-label">💡 Explanation</div>
        <div class="explanation-text">${q.explanation}</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-primary" onclick="prevQuestion()" ${currentQuestion === 0 ? 'disabled' : ''}>← Previous</button>
      <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()" ${answers[currentQuestion] === undefined ? 'disabled' : ''} style="display:${answers[currentQuestion] !== undefined ? 'block' : 'none'}">
        ${currentQuestion === questions.length - 1 ? 'Submit Quiz' : 'Next →'}
      </button>
    </div>
  `;
}

function selectOption(index) {
  answers[currentQuestion] = index;
  const q = questions[currentQuestion];
  const options = document.querySelectorAll('.option');
  const explanation = document.getElementById('explanation');
  
  // Disable all options
  options.forEach(opt => {
    opt.style.pointerEvents = 'none';
    opt.style.opacity = '0.7';
  });
  
  // Show visual feedback
  options.forEach((opt, i) => {
    opt.classList.remove('selected', 'correct', 'incorrect');
    
    if (i === index) {
      // User's answer
      if (i === q.correct_option_index) {
        opt.classList.add('correct');
      } else {
        opt.classList.add('incorrect');
      }
    }
    
    // Always highlight the correct answer
    if (i === q.correct_option_index) {
      opt.classList.add('correct');
    }
  });
  
  // Show explanation
  if (explanation) {
    explanation.classList.add('show');
  }
  
  // Show next button
  const nextBtn = document.getElementById('next-btn');
  if (nextBtn) {
    nextBtn.style.display = 'block';
  }
}

function prevQuestion() {
  if (currentQuestion > 0) {
    currentQuestion--;
    renderQuestion();
  }
}

function nextQuestion() {
  if (currentQuestion < questions.length - 1) {
    currentQuestion++;
    renderQuestion();
  } else {
    calculateScore();
  }
}

function calculateScore() {
  sessionScore = 0;
  let correctCount = 0;
  
  Object.keys(answers).forEach(idx => {
    const q = questions[idx];
    if (answers[idx] === q.correct_option_index) {
      sessionScore += 10;
      correctCount++;
    }
  });
  
  // Save score to user progress
  const user = getCurrentUser();
  if (user) {
    const chapterId = `ch_${chapterNum}_${urlParams.get('subject') || 'general'}`;
    const points = sessionScore;
    const accuracy = Math.round((correctCount / questions.length) * 100);
    
    // Record the quiz attempt for each question
    questions.forEach((q, idx) => {
      const isCorrect = answers[idx] === q.correct_option_index;
      recordQuizAttempt(user.user_id, chapterId, q.question_id, isCorrect, false);
    });
    
    console.log(`Quiz completed: ${sessionScore}/${questions.length * 10} points, ${accuracy}% accuracy`);
  }
  
  document.getElementById('session-score').textContent = sessionScore;
  showResults();
}

function showResults() {
  const quizContainer = document.getElementById('quiz-container');
  const resultsContainer = document.getElementById('results-container');
  const percentage = Math.round((sessionScore / (questions.length * 10)) * 100);
  
  // SAVE SCORE TO USER PROGRESS
  const user = getCurrentUser();
  if (user) {
    let progress = getUserProgress(user.user_id);
    if (!progress) {
      progress = {
        user_id: user.user_id,
        total_points: 0,
        chapters_progress: {},
        current_streak: 0,
        longest_streak: 0,
        last_activity: new Date().toISOString()
      };
    }
    
    // Create a unit key for tracking
    const unitKey = `ch_${chapterNum}_u_${unitNum}`;
    if (!progress.chapters_progress[unitKey]) {
      progress.chapters_progress[unitKey] = {
        points_earned: 0,
        accuracy_pct: 0,
        attempts: 0,
        status: 'in_progress'
      };
    }
    
    // Update with best score
    if (sessionScore > (progress.chapters_progress[unitKey].points_earned || 0)) {
      progress.chapters_progress[unitKey].points_earned = sessionScore;
      progress.chapters_progress[unitKey].accuracy_pct = percentage;
    }
    
    progress.chapters_progress[unitKey].attempts = (progress.chapters_progress[unitKey].attempts || 0) + 1;
    progress.chapters_progress[unitKey].last_attempt = new Date().toISOString();
    
    // Mark as completed if 100%
    if (percentage === 100) {
      progress.chapters_progress[unitKey].status = 'completed';
    }
    
    // Update total points
    progress.total_points = Object.values(progress.chapters_progress).reduce((sum, cp) => sum + (cp.points_earned || 0), 0);
    progress.last_activity = new Date().toISOString();
    
    // Save to localStorage
    addToStore('ss_user_progress', user.user_id, progress);
  }
  
  let message = '';
  if (percentage === 100) message = '🏆 Perfect score! You\'re a star!';
  else if (percentage >= 80) message = '🌟 Excellent work!';
  else if (percentage >= 60) message = '✅ Good job! Keep practicing!';
  else if (percentage >= 40) message = '📚 Nice effort! Review and try again!';
  else message = '💪 Keep learning! You\'ll improve!';

  quizContainer.style.display = 'none';
  resultsContainer.style.display = 'block';
  resultsContainer.innerHTML = `
    <div class="results">
      <div class="results-score">${sessionScore}/${questions.length * 10}</div>
      <div class="results-percentage">${percentage}% Correct</div>
      <div class="results-message">${message}</div>
      <button class="btn btn-back" onclick="goBack()">← Back to Chapters</button>
    </div>
  `;
}

function goBack() {
  window.location.href = 'chapters.html';
}

function getState() {
  try { return JSON.parse(sessionStorage.getItem('ss_state')) || {}; }
  catch { return {}; }
}

function getStore(key) {
  try { return JSON.parse(localStorage.getItem(key)) || {}; }
  catch { return {}; }
}

renderQuestion();
</script>
</body>
</html>
