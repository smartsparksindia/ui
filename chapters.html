<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartSpark ⚡ — Chapters</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--yellow:#F5C518;--orange:#F07733;--purple:#6C4EE4;--teal:#15A585;--pink:#E8437F;--blue:#2176FF;--bg:#0F0E17;--card:#211F35;--border:rgba(255,255,255,0.08);--text:#F2EFE9;--muted:rgba(242,239,233,0.5);--r:18px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(108,78,228,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(108,78,228,0.05) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}

nav{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 3rem;border-bottom:1px solid var(--border);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;background:rgba(15,14,23,0.85);}
.logo{font-family:'Baloo 2',cursive;font-size:1.7rem;font-weight:800;color:var(--text);text-decoration:none;}
.logo em{color:var(--yellow);font-style:normal;}
.nav-right{display:flex;align-items:center;gap:1rem;}
.score-pill{background:rgba(245,197,24,0.12);border:1px solid rgba(245,197,24,0.25);color:var(--yellow);padding:0.4rem 1rem;border-radius:50px;font-weight:800;font-size:0.9rem;}
.back-btn{color:var(--muted);text-decoration:none;font-weight:700;font-size:0.9rem;transition:color 0.2s;}
.back-btn:hover{color:var(--text);}

.breadcrumb{display:flex;align-items:center;gap:0.5rem;padding:1.5rem 3rem 0;font-size:0.85rem;font-weight:700;color:var(--muted);position:relative;z-index:1;}
.breadcrumb a{color:var(--purple);text-decoration:none;}

.page-header{text-align:center;padding:3rem 2rem 2rem;position:relative;z-index:1;}
.subject-badge{display:inline-flex;align-items:center;gap:0.5rem;padding:0.5rem 1.4rem;border-radius:50px;font-weight:800;font-size:1rem;margin-bottom:1rem;}
.page-header h1{font-family:'Baloo 2',cursive;font-size:clamp(1.8rem,5vw,3rem);font-weight:800;margin-bottom:0.5rem;}
.page-header p{color:var(--muted);font-size:1rem;font-weight:600;}

.main-wrap{max-width:800px;margin:0 auto;padding:1rem 2rem 5rem;position:relative;z-index:1;}

.chapter-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:1.5rem 2rem;
  display:flex;align-items:center;gap:1.5rem;
  text-decoration:none;color:var(--text);
  transition:transform 0.2s,border-color 0.2s,background 0.2s;
  margin-bottom:0.9rem;
  position:relative;overflow:hidden;
  cursor:pointer;
}
.chapter-card:hover{transform:translateX(6px);}

.ch-num{
  font-family:'Baloo 2',cursive;
  font-size:1.8rem;font-weight:800;
  min-width:3rem;text-align:center;
  opacity:0.35;
}
.ch-info{flex:1;}
.ch-name{font-family:'Baloo 2',cursive;font-size:1.2rem;font-weight:700;margin-bottom:0.3rem;}
.ch-meta{display:flex;gap:1rem;font-size:0.8rem;font-weight:700;color:var(--muted);}
.ch-tag{display:flex;align-items:center;gap:0.3rem;}
.ch-right{display:flex;flex-direction:column;align-items:flex-end;gap:0.5rem;}
.ch-score-badge{font-size:0.78rem;font-weight:800;padding:0.25rem 0.8rem;border-radius:50px;}
.ch-status{font-size:1.2rem;}
.ch-bar{width:80px;height:4px;background:rgba(255,255,255,0.08);border-radius:50px;overflow:hidden;}
.ch-bar-fill{height:100%;border-radius:50px;}

.start-btn{
  margin-top:0.8rem;padding:0.45rem 1.2rem;
  border-radius:50px;border:none;cursor:pointer;
  font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:800;
  transition:transform 0.15s,opacity 0.15s;
}
.start-btn:hover{transform:scale(1.05);}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.chapter-card{animation:fadeUp 0.4s ease both;}

@media(max-width:600px){nav{padding:1rem 1.2rem;}.breadcrumb{padding:1rem 1.2rem 0;}.main-wrap{padding:1rem 1rem 4rem;}.chapter-card{padding:1.2rem;gap:1rem;}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Smart<em>Spark</em>⚡</a>
  <div class="nav-right">
    <div class="score-pill">⭐ <span id="total-score">0</span> pts</div>
    <a href="subjects.html" class="back-btn">← Subjects</a>
  </div>
</nav>

<div class="breadcrumb">
  <a href="index.html">Home</a> <span style="color:rgba(255,255,255,0.2)">›</span>
  <a href="subjects.html" id="bc-year">Year —</a> <span style="color:rgba(255,255,255,0.2)">›</span>
  <span id="bc-subject">—</span>
</div>

<div class="page-header">
  <div class="subject-badge" id="subject-badge">📚 Subject</div>
  <h1>Choose a Chapter</h1>
  <p>Master one chapter at a time — learn first, then quiz!</p>
</div>

<div class="main-wrap" id="chapters-list"></div>

<script src="curriculum.js"></script>
<script>
const state = getState();
const year = state.year || 6;
const subject = state.subject || 'Science';

document.getElementById('total-score').textContent = getTotalScore();
document.getElementById('bc-year').textContent = `Year ${year}`;
document.getElementById('bc-subject').textContent = subject;

const colorMap = { teal:'#15A585', purple:'#6C4EE4', pink:'#E8437F', amber:'#F07733', blue:'#2176FF' };
const subjectData = (CURRICULUM[year]||CURRICULUM[6])[subject];
const accent = colorMap[subjectData?.color || 'purple'] || '#6C4EE4';

const badge = document.getElementById('subject-badge');
badge.textContent = `${subjectData?.icon||'📚'} ${subject}`;
badge.style.background = accent + '22';
badge.style.border = `1px solid ${accent}44`;
badge.style.color = accent;

const list = document.getElementById('chapters-list');
const chapters = Object.entries(subjectData?.chapters || {});

chapters.forEach(([chapter, data], i) => {
  const bestScore = getChapterScore(year, subject, chapter);
  const maxScore = data.quiz.length * 10;
  const pct = maxScore > 0 ? Math.round(bestScore / maxScore * 100) : 0;
  const done = bestScore > 0;

  const card = document.createElement('div');
  card.className = 'chapter-card';
  card.style.animationDelay = `${i * 0.07}s`;
  card.style.borderLeft = `3px solid ${accent}44`;

  card.innerHTML = `
    <div class="ch-num" style="color:${accent}">${String(i+1).padStart(2,'0')}</div>
    <div class="ch-info">
      <div class="ch-name">${chapter}</div>
      <div class="ch-meta">
        <span class="ch-tag">🃏 ${data.flashcards.length} flashcards</span>
        <span class="ch-tag">❓ ${data.quiz.length} questions</span>
      </div>
    </div>
    <div class="ch-right">
      ${done
        ? `<div class="ch-score-badge" style="background:${accent}22;color:${accent}">⭐ ${bestScore} pts</div>
           <div class="ch-bar"><div class="ch-bar-fill" style="background:${accent};width:${pct}%"></div></div>`
        : `<div class="ch-status">🔓</div>`
      }
      <button class="start-btn" style="background:${accent};color:#0F0E17">
        ${done ? '🔄 Retry' : '▶ Start'}
      </button>
    </div>
  `;

  card.onclick = () => {
    setState({ chapter });
    window.location.href = 'learn.html';
  };

  list.appendChild(card);
});
</script>
</body>
</html>
