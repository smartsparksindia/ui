<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartSpark — Chapters</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root { --purple: #7F77DD; --purple-light: #EEEDFE; --teal: #1D9E75; --teal-light: #E1F5EE; --coral: #D85A30; --coral-light: #FAECE7; --amber: #BA7517; --amber-light: #FAEEDA; --pink: #D4537E; --pink-light: #FBEAF0; --bg: #FFF9F0; --card-bg: #FFFFFF; --text: #2C2C2A; --text-muted: #888780; --radius: 20px; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13px; }

nav { background: white; padding: 1rem 2.5rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid #F0EBE0; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.logo { font-family: 'Fredoka One', cursive; font-size: 1.5rem; color: var(--purple); text-decoration: none; }
.logo span { color: var(--coral); }
.nav-right { display: flex; align-items: center; gap: 1rem; }
.score-pill { background: var(--amber-light); color: var(--amber); padding: 0.4rem 0.8rem; border-radius: 50px; font-weight: 800; font-size: 0.85rem; }
.back-btn { color: var(--text-muted); text-decoration: none; font-weight: 700; font-size: 0.9rem; }

.breadcrumb { padding: 1rem 2.5rem 0; font-size: 0.75rem; color: var(--text-muted); }
.breadcrumb a { color: var(--purple); text-decoration: none; }

.header { text-align: center; padding: 1.5rem 2rem; }
.header h1 { font-family: 'Fredoka One', cursive; font-size: 1.6rem; margin-bottom: 0.4rem; }
.header p { color: var(--text-muted); font-weight: 600; font-size: 0.9rem; }

.chapters-wrap { max-width: 900px; margin: 0 auto; padding: 0 2rem 2rem; }

/* SUBJECT AREA STYLES */
.subject-area-group { margin-bottom: 1.5rem; }

/* ACCORDION STYLES */
.chapter-group { margin-bottom: 0.8rem; }

.chapter-header {
  background: white;
  border-radius: 8px;
  padding: 0.9rem 1.2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  transition: all 0.2s;
  border: 2px solid #E8E3DB;
  user-select: none;
}

.chapter-header:hover {
  box-shadow: 0 4px 12px rgba(127, 119, 221, 0.1);
  transform: translateY(-2px);
}

.chapter-header.active {
  border-color: var(--purple);
}

.chapter-title {
  font-family: 'Fredoka One', cursive;
  font-size: 0.95rem;
  color: var(--text);
  font-weight: 800;
}

.chapter-meta {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-top: 0.2rem;
}

.chapter-toggle {
  font-size: 1rem;
  transition: transform 0.2s;
  color: var(--purple);
}

.chapter-header.active .chapter-toggle {
  transform: rotate(180deg);
}

.units-container {
  display: none;
  background: white;
  padding: 0.8rem;
  border: 2px solid #E8E3DB;
  border-top: none;
  border-radius: 0 0 8px 8px;
}

.units-container.active {
  display: block;
}

.unit-item {
  background: #FAFAF8;
  border-radius: 6px;
  padding: 0.8rem;
  margin-bottom: 0.6rem;
  border-left: 4px solid var(--teal);
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: all 0.2s;
}

.unit-item:hover {
  box-shadow: 0 4px 12px rgba(127, 119, 221, 0.1);
  transform: translateY(-2px);
}

.unit-info {
  flex: 1;
}

.unit-name {
  font-family: 'Fredoka One', cursive;
  font-size: 0.9rem;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 0.2rem;
}

.unit-meta {
  font-size: 0.7rem;
  color: var(--text-muted);
}

.unit-buttons {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
}

.btn {
  padding: 0.45rem 0.9rem;
  border: none;
  border-radius: 6px;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 0.75rem;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  white-space: nowrap;
}

.btn-flashcard {
  background: linear-gradient(135deg, #E1F5EE, #B2DFDB);
  color: var(--teal);
  border: 2px solid var(--teal);
}

.btn-flashcard:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(29, 158, 117, 0.2);
}

.btn-quiz {
  background: linear-gradient(135deg, #EEEDFE, #D1CCFA);
  color: var(--purple);
  border: 2px solid var(--purple);
}

.btn-quiz:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(127, 119, 221, 0.2);
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.empty-state {
  text-align: center;
  padding: 3rem 2rem;
  color: var(--text-muted);
}

.empty-state h3 {
  font-family: 'Fredoka One', cursive;
  margin-bottom: 0.5rem;
}

footer { background: var(--text); color: white; text-align: center; padding: 1.5rem 2rem; font-size: 0.85rem; }
footer p { color: rgba(255,255,255,0.45); margin-top: 0.3rem; }

@media(max-width: 600px) {
  body { font-size: 12px; }
  .unit-buttons {
    flex-direction: column;
    width: 100%;
  }

  .btn {
    width: 100%;
    justify-content: center;
  }

  .unit-item {
    flex-direction: column;
    align-items: flex-start;
  }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Smart<span>Spark</span> ⚡</a>
  <div class="nav-right">
    <div class="score-pill">⭐ <span id="total-score">0</span> pts</div>
    <a href="subjects.html" class="back-btn">← Subjects</a>
  </div>
</nav>

<div class="breadcrumb">
  <a href="index.html">Home</a> › <a href="subjects.html" id="bc-year">Class 6</a> › <span id="bc-subject">—</span>
</div>

<div class="header">
  <h1>📚 Learn</h1>
  <p>Select a Subject Area, expand chapters, and explore units</p>
</div>

<div class="chapters-wrap" id="chapters-container"></div>

<footer>
  <div style="font-family:'Fredoka One',cursive;font-size:1.8rem;margin-bottom:0.4rem;">Smart<span style="color:#F0997B;">Spark</span> ⚡</div>
  <p>Free learning for Indian students 🇮🇳</p>
</footer>

<script src="data-layer.js"></script>
<script>
const state = getState();
const year = state.year || 6;
const subject = state.subject || 'Science';

document.getElementById('bc-year').textContent = `Class ${year}`;
document.getElementById('bc-subject').textContent = subject;
document.getElementById('total-score').textContent = getTotalScore();

// Load published data from `data/published/*.json` FIRST, fall back to localStorage
let allFlashcards = {};
let allQuestions = {};
let allChapters = {};
const PUBLISHED_BASE_PATHS = ['data/published', './data/published', '/data/published'];

async function fetchPublishedFile(filename) {
  for (const base of PUBLISHED_BASE_PATHS) {
    try {
      const res = await fetch(`${base}/${filename}`);
      if (res.ok) {
        return await res.json();
      }
    } catch (e) {
      // ignore and try next path
    }
  }
  return null;
}

async function loadDataStores() {
  // Try published files first
  const [chapData, fcData, qData] = await Promise.all([
    fetchPublishedFile('chapters.json'),
    fetchPublishedFile('flashcards.json'),
    fetchPublishedFile('questions.json')
  ]);

  // If published files exist, use them exclusively
  if (chapData !== null && fcData !== null && qData !== null) {
    console.log('✅ Loaded published data from data/published/');
    allChapters = Array.isArray(chapData) ? chapData.reduce((acc, ch) => ({ ...acc, [ch.chapter_id]: ch }), {}) : chapData;
    allFlashcards = Array.isArray(fcData) ? fcData.reduce((acc, fc) => ({ ...acc, [fc.flashcard_id]: fc }), {}) : fcData;
    allQuestions = Array.isArray(qData) ? qData.reduce((acc, q) => ({ ...acc, [q.question_id]: q }), {}) : qData;
  } else {
    // Fall back to localStorage
    console.log('⚠️ Published data not found, using localStorage');
    allChapters = getStore('ss_chapters');
    allFlashcards = getStore('ss_flashcards');
    allQuestions = getStore('ss_question_bank');
  }
}

function getChapterTitle(chapterNum, areaName) {
  const key = String(chapterNum);
  const chapter = Object.values(allChapters).find(ch => 
    ch.subject === subject && 
    ch.class === year && 
    String(ch.chapter) === key &&
    ch.subject_area === areaName
  );
  return chapter ? chapter.title : null;
}

// DEBUG will log after published stores are loaded

function renderChapters() {
  // Group by subject_area > chapter > unit for selected subject
  // Create a completely fresh object each time to prevent data mutation/reuse
  const areasBySubject = {};

  // Process flashcards
  Object.values(allFlashcards).forEach(fc => {
    if (fc.chapter && fc.unit && fc.subject === subject && fc.class === year) {
      const area = fc.subject_area || 'Uncategorized';
      
      // Ensure fresh objects at each level
      if (!areasBySubject[area]) {
        areasBySubject[area] = {};
      }
      if (!areasBySubject[area][fc.chapter]) {
        areasBySubject[area][fc.chapter] = {};
      }
      if (!areasBySubject[area][fc.chapter][fc.unit]) {
        // Create fresh arrays each time
        areasBySubject[area][fc.chapter][fc.unit] = { flashcards: [], questions: [] };
      }
      
      // Push to fresh array
      areasBySubject[area][fc.chapter][fc.unit].flashcards.push(fc);
    }
  });

  // Process questions
  Object.values(allQuestions).forEach(q => {
    if (q.chapter && q.unit && q.subject === subject && q.class === year) {
      const area = q.subject_area || 'Uncategorized';
      
      // Ensure fresh objects at each level
      if (!areasBySubject[area]) {
        areasBySubject[area] = {};
      }
      if (!areasBySubject[area][q.chapter]) {
        areasBySubject[area][q.chapter] = {};
      }
      if (!areasBySubject[area][q.chapter][q.unit]) {
        // Create fresh arrays each time
        areasBySubject[area][q.chapter][q.unit] = { flashcards: [], questions: [] };
      }
      
      // Push to fresh array
      console.log(`DEBUG - Adding question to ${area} > Ch${q.chapter} > U${q.unit}:`, q.question_id);
      areasBySubject[area][q.chapter][q.unit].questions.push(q);
    }
  });

  // Render subject areas
  const container = document.getElementById('chapters-container');
  
  console.log('DEBUG - areasBySubject structure:', areasBySubject);
  console.log('DEBUG - Areas found:', Object.keys(areasBySubject));

  if (Object.keys(areasBySubject).length === 0) {
    container.innerHTML = '<div class="empty-state"><h3>No content available yet</h3><p>Content for ' + subject + ' is being prepared.</p></div>';
  } else {
    container.innerHTML = '';
    const areas = Object.keys(areasBySubject).sort();
    
    areas.forEach(areaName => {
      const chapters = areasBySubject[areaName];
      const chapterNums = Object.keys(chapters).sort((a, b) => parseInt(a) - parseInt(b));
      
      // Subject Area Group
      const areaGroupDiv = document.createElement('div');
      areaGroupDiv.className = 'subject-area-group';
      
      const areaHeaderDiv = document.createElement('div');
      areaHeaderDiv.className = 'subject-area-header';
      areaHeaderDiv.innerHTML = `
        <div>
          <h3 class="subject-area-title">${areaName}</h3>
          <p class="subject-area-meta">${chapterNums.length} chapter${chapterNums.length !== 1 ? 's' : ''}</p>
        </div>
        <div class="subject-area-toggle">▼</div>
      `;
      
      const chaptersDiv = document.createElement('div');
      chaptersDiv.className = 'chapters-container';
      
      chapterNums.forEach(chapterNum => {
        const units = chapters[chapterNum];
        const unitNums = Object.keys(units).sort((a, b) => parseInt(a) - parseInt(b));
        
        console.log('DEBUG - Rendering chapter:', chapterNum, 'with units:', unitNums);
        
        const chapterDiv = document.createElement('div');
        chapterDiv.className = 'chapter-group';
        
        const chapterHeaderDiv = document.createElement('div');
        chapterHeaderDiv.className = 'chapter-header';
        const chapterTitle = getChapterTitle(chapterNum, areaName) || `Chapter ${chapterNum}`;
        chapterHeaderDiv.innerHTML = `
          <div>
            <div class="chapter-title">Chapter ${chapterNum}: ${chapterTitle}</div>
            <div class="chapter-meta">${unitNums.length} unit${unitNums.length !== 1 ? 's' : ''}</div>
          </div>
          <div class="chapter-toggle">▼</div>
        `;
        
        const unitsDiv = document.createElement('div');
        unitsDiv.className = 'units-container';
        
        unitNums.forEach(unitNum => {
          const unitData = units[unitNum];
          const fcCount = unitData.flashcards.length;
          const qCount = unitData.questions.length;
          
          // Get unit name from first flashcard or question that has it
          let unitName = null;
          if (unitData.flashcards.length > 0 && unitData.flashcards[0].unit_name) {
            unitName = unitData.flashcards[0].unit_name;
          } else if (unitData.questions.length > 0 && unitData.questions[0].unit_name) {
            unitName = unitData.questions[0].unit_name;
          }
          
          // Check if unit is aced (>=80% accuracy)
          const user = getCurrentUser();
          let isAced = false;
          if (user) {
            const progress = getUserProgress(user.user_id);
            const unitKey = `ch_${chapterNum}_u_${unitNum}`;
            if (progress && progress.chapters_progress && progress.chapters_progress[unitKey]) {
              const unitProgress = progress.chapters_progress[unitKey];
              isAced = unitProgress.accuracy_pct >= 80;
            }
          }
          
          const unitDiv = document.createElement('div');
          unitDiv.className = 'unit-item';
          const crownPrefix = isAced ? '👑 ' : '';
          const displayName = unitName ? `${crownPrefix}Unit ${unitNum} - ${unitName}` : `${crownPrefix}Unit ${unitNum}`;
          unitDiv.innerHTML = `
            <div class="unit-info">
              <div class="unit-name">${displayName}</div>
              <div class="unit-meta">🃏 ${fcCount} flashcard${fcCount !== 1 ? 's' : ''} • ❓ ${qCount} question${qCount !== 1 ? 's' : ''}</div>
            </div>
            <div class="unit-buttons">
              <a href="flashcard.html?chapter=${chapterNum}&unit=${unitNum}" class="btn btn-flashcard" ${fcCount === 0 ? 'disabled' : ''}>
                🃏 Flashcard
              </a>
              <a href="quiz.html?chapter=${chapterNum}&unit=${unitNum}" class="btn btn-quiz" ${qCount === 0 ? 'disabled' : ''}>
                ❓ Quiz
              </a>
            </div>
          `;
          
          unitsDiv.appendChild(unitDiv);
        });
        
        // Chapter toggle
        chapterHeaderDiv.addEventListener('click', () => {
          chapterHeaderDiv.classList.toggle('active');
          unitsDiv.classList.toggle('active');
        });
        
        chapterDiv.appendChild(chapterHeaderDiv);
        chapterDiv.appendChild(unitsDiv);
        chaptersDiv.appendChild(chapterDiv);
      });
      
      // Subject Area toggle
      areaHeaderDiv.addEventListener('click', () => {
        areaHeaderDiv.classList.toggle('active');
        chaptersDiv.classList.toggle('active');
      });
      
      areaGroupDiv.appendChild(areaHeaderDiv);
      areaGroupDiv.appendChild(chaptersDiv);
      container.appendChild(areaGroupDiv);
    });
  }
}

// Initial render (load published stores first if present)
(async function initPublished() {
  await loadDataStores();
  renderChapters();
})();

function getState() {
  try { return JSON.parse(sessionStorage.getItem('ss_state')) || {}; }
  catch { return {}; }
}

function getTotalScore() {
  const user = getCurrentUser();
  if (!user) return 0;
  const progress = getUserProgress(user.user_id);
  return progress?.total_points || 0;
}

function getStore(key) {
  try { return JSON.parse(localStorage.getItem(key)) || {}; }
  catch { return {}; }
}
</script>
</body>
</html>
