<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartSpark — Chapters</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root { --purple: #7F77DD; --purple-light: #EEEDFE; --teal: #1D9E75; --teal-light: #E1F5EE; --coral: #D85A30; --coral-light: #FAECE7; --amber: #BA7517; --amber-light: #FAEEDA; --pink: #D4537E; --pink-light: #FBEAF0; --bg: #FFF9F0; --card-bg: #FFFFFF; --text: #2C2C2A; --text-muted: #888780; --radius: 20px; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
nav { background: white; padding: 1rem 2.5rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid #F0EBE0; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.logo { font-family: 'Fredoka One', cursive; font-size: 2rem; color: var(--purple); text-decoration: none; }
.logo span { color: var(--coral); }
.nav-right { display: flex; align-items: center; gap: 1rem; }
.score-pill { background: var(--amber-light); color: var(--amber); padding: 0.4rem 1rem; border-radius: 50px; font-weight: 800; }
.back-btn { color: var(--text-muted); text-decoration: none; font-weight: 700; }
.breadcrumb { padding: 1.5rem 2.5rem 0; font-size: 0.85rem; color: var(--text-muted); }
.breadcrumb a { color: var(--purple); text-decoration: none; }
.header { text-align: center; padding: 2.5rem 2rem; }
.header h1 { font-family: 'Fredoka One', cursive; font-size: 2.2rem; margin-bottom: 0.6rem; }
.header p { color: var(--text-muted); font-weight: 600; }
.chapters-wrap { max-width: 800px; margin: 0 auto; padding: 0 2rem 4rem; }
.chapter-card { background: white; border-radius: var(--radius); padding: 1.5rem 2rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 1.5rem; text-decoration: none; color: var(--text); cursor: pointer; transition: transform 0.2s; }
.chapter-card:hover { transform: translateX(6px); }
.ch-num { font-family: 'Fredoka One', cursive; font-size: 1.8rem; min-width: 3rem; text-align: center; opacity: 0.35; }
.ch-info { flex: 1; }
.ch-name { font-family: 'Fredoka One', cursive; font-size: 1.2rem; margin-bottom: 0.3rem; }
.ch-meta { display: flex; gap: 1rem; font-size: 0.8rem; color: var(--text-muted); }
.ch-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.5rem; }
.ch-badge { font-size: 0.78rem; font-weight: 800; padding: 0.25rem 0.8rem; border-radius: 50px; }
.ch-status { font-size: 1.2rem; }
footer { background: var(--text); color: white; text-align: center; padding: 2.5rem 2rem; }
footer p { color: rgba(255,255,255,0.45); margin-top: 0.4rem; }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Smart<span>Spark</span> ⚡</a>
  <div class="nav-right">
    <div class="score-pill">⭐ <span id="total-score">0</span> pts</div>
    <a href="subjects.html" class="back-btn">← Subjects</a>
  </div>
</nav>
<div class="breadcrumb"><a href="index.html">Home</a> › <a href="subjects.html" id="bc-year">Class 6</a> › <span id="bc-subject">—</span></div>
<div class="header">
  <h1>Choose a Chapter</h1>
  <p>Master one chapter at a time — learn first, then quiz!</p>
</div>
<div class="chapters-wrap" id="chapters-list"></div>
<footer>
  <div style="font-family:'Fredoka One',cursive;font-size:1.8rem;margin-bottom:0.4rem;">Smart<span style="color:#F0997B;">Spark</span> ⚡</div>
  <p>Free learning for Indian students 🇮🇳</p>
</footer>
<script src="data-layer.js"></script>
<script>
const state = getState();
const year = state.year || 6;
const subject = state.subject || 'Science';
const colorMap = { 'Science': '#1D9E75', 'Maths': '#7F77DD', 'English': '#D4537E', 'Social Science': '#BA7517' };
const accent = colorMap[subject] || '#7F77DD';

document.getElementById('bc-year').textContent = `Class ${year}`;
document.getElementById('bc-subject').textContent = subject;
document.getElementById('total-score').textContent = getTotalScore();

const chapters = getChaptersForYearSubject(year, subject);
const list = document.getElementById('chapters-list');

chapters.forEach((ch, i) => {
  const bestScore = getChapterScore(year, subject, ch.chapter_id);
  const done = bestScore > 0;
  const card = document.createElement('div');
  card.className = 'chapter-card';
  card.style.borderLeft = `3px solid ${accent}44`;
  card.innerHTML = `
    <div class="ch-num" style="color:${accent}">${String(i+1).padStart(2,'0')}</div>
    <div class="ch-info">
      <div class="ch-name">${ch.title}</div>
      <div class="ch-meta">
        <span>🃏 ${(ch.flashcard_ids || []).length} flashcards</span>
        <span>❓ ${(ch.question_ids || []).length} questions</span>
      </div>
    </div>
    <div class="ch-right">
      ${done ? `<div class="ch-badge" style="background:${accent}22;color:${accent}">⭐ ${bestScore} pts</div>` : `<div class="ch-status">🔓</div>`}
      <button class="ch-btn" style="background:${accent};color:#fff;border:none;padding:0.5rem 1.2rem;border-radius:8px;font-weight:700;cursor:pointer;">
        ${done ? '🔄 Retry' : '▶ Start'}
      </button>
    </div>
  `;
  card.onclick = () => { setState({ chapter: ch.chapter_id }); window.location.href = 'learn.html'; };
  list.appendChild(card);
});

function getChaptersForYearSubject(year, subject) {
  const chapters = getStore('ss_chapters');
  return Object.values(chapters).filter(ch => ch.class === year && ch.subject === subject && ch.status === 'published');
}

function getChapterScore(year, subject, chapterId) {
  const user = getCurrentUser();
  if (!user) return 0;
  const progress = getUserProgress(user.user_id);
  if (!progress || !progress.chapters_progress[chapterId]) return 0;
  return progress.chapters_progress[chapterId].points_earned || 0;
}

function getTotalScore() {
  const user = getCurrentUser();
  if (!user) return 0;
  const progress = getUserProgress(user.user_id);
  return progress?.total_points || 0;
}

function getState() { try { return JSON.parse(sessionStorage.getItem('ss_state')) || {}; } catch { return {}; } }
function setState(patch) { const s = { ...getState(), ...patch }; sessionStorage.setItem('ss_state', JSON.stringify(s)); }
</script>
</body>
</html>
