<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartSpark — Chapters</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root { --purple: #7F77DD; --purple-light: #EEEDFE; --teal: #1D9E75; --teal-light: #E1F5EE; --coral: #D85A30; --coral-light: #FAECE7; --amber: #BA7517; --amber-light: #FAEEDA; --pink: #D4537E; --pink-light: #FBEAF0; --bg: #FFF9F0; --card-bg: #FFFFFF; --text: #2C2C2A; --text-muted: #888780; --radius: 20px; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13px; }

nav { background: white; padding: 1rem 2.5rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid #F0EBE0; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.logo { font-family: 'Fredoka One', cursive; font-size: 1.5rem; color: var(--purple); text-decoration: none; }
.logo span { color: var(--coral); }
.nav-right { display: flex; align-items: center; gap: 1rem; }
.score-pill { background: var(--amber-light); color: var(--amber); padding: 0.4rem 0.8rem; border-radius: 50px; font-weight: 800; font-size: 0.85rem; }
.back-btn { color: var(--text-muted); text-decoration: none; font-weight: 700; font-size: 0.9rem; }

.breadcrumb { padding: 1rem 2.5rem 0; font-size: 0.75rem; color: var(--text-muted); }
.breadcrumb a { color: var(--purple); text-decoration: none; }

.header { text-align: center; padding: 1.5rem 2rem; }
.header h1 { font-family: 'Fredoka One', cursive; font-size: 1.6rem; margin-bottom: 0.4rem; }
.header p { color: var(--text-muted); font-weight: 600; font-size: 0.9rem; }

.subject-area-header {
  background: white;
  border-radius: var(--radius);
  padding: 1.2rem 1.5rem;
  margin: 0 2rem 1.5rem;
  border-left: 6px solid var(--purple);
  box-shadow: 0 2px 8px rgba(127, 119, 221, 0.08);
}

.subject-area-header h2 {
  font-family: 'Fredoka One', cursive;
  font-size: 1.1rem;
  color: var(--purple);
  margin: 0 0 0.3rem 0;
}

.subject-area-header #subject-area-value {
  color: var(--coral);
  font-weight: 900;
}

.subject-area-header p {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin: 0;
}

.chapters-wrap { max-width: 900px; margin: 0 auto; padding: 0 2rem 2rem; }

/* ACCORDION STYLES */
.chapter-group { margin-bottom: 1rem; }

.chapter-header {
  background: white;
  border-radius: var(--radius);
  padding: 1rem 1.5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  transition: all 0.2s;
  border: 2px solid #F0EBE0;
  user-select: none;
}

.chapter-header:hover {
  box-shadow: 0 4px 12px rgba(127, 119, 221, 0.1);
  transform: translateY(-2px);
}

.chapter-header.active {
  border-color: var(--purple);
}

.chapter-title {
  font-family: 'Fredoka One', cursive;
  font-size: 1rem;
  color: var(--text);
  font-weight: 800;
}

.chapter-meta {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 0.2rem;
}

.chapter-toggle {
  font-size: 1.2rem;
  transition: transform 0.2s;
  color: var(--purple);
}

.chapter-header.active .chapter-toggle {
  transform: rotate(180deg);
}

.units-container {
  display: none;
  background: #FAFAF8;
  padding: 1rem;
  border: 2px solid #F0EBE0;
  border-top: none;
  border-radius: 0 0 var(--radius) var(--radius);
}

.units-container.active {
  display: block;
}

.unit-item {
  background: white;
  border-radius: 8px;
  padding: 1rem;
  margin-bottom: 0.7rem;
  border-left: 4px solid var(--teal);
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: all 0.2s;
}

.unit-item:hover {
  box-shadow: 0 4px 12px rgba(127, 119, 221, 0.1);
  transform: translateY(-2px);
}

.unit-info {
  flex: 1;
}

.unit-name {
  font-family: 'Fredoka One', cursive;
  font-size: 0.95rem;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 0.2rem;
}

.unit-meta {
  font-size: 0.75rem;
  color: var(--text-muted);
}

.unit-buttons {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
}

.btn {
  padding: 0.5rem 1rem;
  border: none;
  border-radius: 8px;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 0.8rem;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  white-space: nowrap;
}

.btn-flashcard {
  background: linear-gradient(135deg, #E1F5EE, #B2DFDB);
  color: var(--teal);
  border: 2px solid var(--teal);
}

.btn-flashcard:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(29, 158, 117, 0.2);
}

.btn-quiz {
  background: linear-gradient(135deg, #EEEDFE, #D1CCFA);
  color: var(--purple);
  border: 2px solid var(--purple);
}

.btn-quiz:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(127, 119, 221, 0.2);
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.empty-state {
  text-align: center;
  padding: 3rem 2rem;
  color: var(--text-muted);
}

.empty-state h3 {
  font-family: 'Fredoka One', cursive;
  margin-bottom: 0.5rem;
}

footer { background: var(--text); color: white; text-align: center; padding: 1.5rem 2rem; font-size: 0.85rem; }
footer p { color: rgba(255,255,255,0.45); margin-top: 0.3rem; }

@media(max-width: 600px) {
  body { font-size: 12px; }
  .unit-buttons {
    flex-direction: column;
    width: 100%;
  }

  .btn {
    width: 100%;
    justify-content: center;
  }

  .unit-item {
    flex-direction: column;
    align-items: flex-start;
  }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Smart<span>Spark</span> ⚡</a>
  <div class="nav-right">
    <div class="score-pill">⭐ <span id="total-score">0</span> pts</div>
    <a href="subjects.html" class="back-btn">← Subjects</a>
  </div>
</nav>

<div class="breadcrumb">
  <a href="index.html">Home</a> › <a href="subjects.html" id="bc-year">Class 6</a> › <span id="bc-subject">—</span>
</div>

<div class="header">
  <h1>📚 Learn by Units</h1>
  <p>Expand to see chapters, then expand chapters to see units</p>
</div>

<div class="subject-area-header">
  <h2 id="subject-area-title">Subject Area: <span id="subject-area-value">History</span></h2>
  <p>Expand chapters below to explore units with flashcards and quizzes</p>
</div>

<div class="chapters-wrap" id="chapters-container"></div>

<footer>
  <div style="font-family:'Fredoka One',cursive;font-size:1.8rem;margin-bottom:0.4rem;">Smart<span style="color:#F0997B;">Spark</span> ⚡</div>
  <p>Free learning for Indian students 🇮🇳</p>
</footer>

<script src="data-layer.js"></script>
<script>
const state = getState();
let year = state.year || 6;
let subject = state.subject || 'History';

document.getElementById('bc-year').textContent = `Class ${year}`;
document.getElementById('bc-subject').textContent = subject;
document.getElementById('subject-area-value').textContent = subject;
document.getElementById('total-score').textContent = getTotalScore();

// Get all flashcards and questions
const allFlashcards = getStore('ss_flashcards');
const allQuestions = getStore('ss_question_bank');

function renderChapters() {
  // Group by chapter > unit for selected subject
  const unitsByChapter = {};

  // Process flashcards
  Object.values(allFlashcards).forEach(fc => {
    if (fc.chapter && fc.unit && fc.subject === subject && fc.class === year) {
      if (!unitsByChapter[fc.chapter]) unitsByChapter[fc.chapter] = {};
      if (!unitsByChapter[fc.chapter][fc.unit]) {
        unitsByChapter[fc.chapter][fc.unit] = { flashcards: [], questions: [] };
      }
      unitsByChapter[fc.chapter][fc.unit].flashcards.push(fc);
    }
  });

  // Process questions
  Object.values(allQuestions).forEach(q => {
    if (q.chapter && q.unit && q.subject === subject && q.class === year) {
      if (!unitsByChapter[q.chapter]) unitsByChapter[q.chapter] = {};
      if (!unitsByChapter[q.chapter][q.unit]) {
        unitsByChapter[q.chapter][q.unit] = { flashcards: [], questions: [] };
      }
      unitsByChapter[q.chapter][q.unit].questions.push(q);
    }
  });

  // Render chapters
  const container = document.getElementById('chapters-container');

  if (Object.keys(unitsByChapter).length === 0) {
    container.innerHTML = '<div class="empty-state"><h3>No units available yet</h3><p>Content is being prepared for this subject area.</p></div>';
  } else {
    container.innerHTML = '';
    const chapters = Object.keys(unitsByChapter).sort((a, b) => parseInt(a) - parseInt(b));
    
    chapters.forEach(chapterNum => {
      const units = unitsByChapter[chapterNum];
      const unitNums = Object.keys(units).sort((a, b) => parseInt(a) - parseInt(b));
      
      const chapterDiv = document.createElement('div');
      chapterDiv.className = 'chapter-group';
      
      const headerDiv = document.createElement('div');
      headerDiv.className = 'chapter-header';
      headerDiv.innerHTML = `
        <div>
          <div class="chapter-title">Chapter ${chapterNum}</div>
          <div class="chapter-meta">${unitNums.length} unit${unitNums.length !== 1 ? 's' : ''}</div>
        </div>
        <div class="chapter-toggle">▼</div>
      `;
      
      const unitsDiv = document.createElement('div');
      unitsDiv.className = 'units-container';
      
      unitNums.forEach(unitNum => {
        const unitData = units[unitNum];
        const fcCount = unitData.flashcards.length;
        const qCount = unitData.questions.length;
        
        const unitDiv = document.createElement('div');
        unitDiv.className = 'unit-item';
        unitDiv.innerHTML = `
          <div class="unit-info">
            <div class="unit-name">Unit ${unitNum}</div>
            <div class="unit-meta">🃏 ${fcCount} flashcard${fcCount !== 1 ? 's' : ''} • ❓ ${qCount} question${qCount !== 1 ? 's' : ''}</div>
          </div>
          <div class="unit-buttons">
            <a href="flashcard.html?chapter=${chapterNum}&unit=${unitNum}" class="btn btn-flashcard" ${fcCount === 0 ? 'disabled' : ''}>
              🃏 Flashcard
            </a>
            <a href="quiz.html?chapter=${chapterNum}&unit=${unitNum}" class="btn btn-quiz" ${qCount === 0 ? 'disabled' : ''}>
              ❓ Quiz
            </a>
          </div>
        `;
        
        unitsDiv.appendChild(unitDiv);
      });
      
      // Toggle functionality
      headerDiv.addEventListener('click', () => {
        headerDiv.classList.toggle('active');
        unitsDiv.classList.toggle('active');
      });
      
      chapterDiv.appendChild(headerDiv);
      chapterDiv.appendChild(unitsDiv);
      container.appendChild(chapterDiv);
    });
  }
}

// Initial render
renderChapters();

function getState() {
  try { return JSON.parse(sessionStorage.getItem('ss_state')) || {}; }
  catch { return {}; }
}

function getTotalScore() {
  const user = getCurrentUser();
  if (!user) return 0;
  const progress = getUserProgress(user.user_id);
  return progress?.total_points || 0;
}

function getStore(key) {
  try { return JSON.parse(localStorage.getItem(key)) || {}; }
  catch { return {}; }
}
</script>
</body>
</html>
